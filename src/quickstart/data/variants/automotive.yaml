business_type: "automotive"
variants:
  - id: "aceite-volumen"
    name: "Volumen de Aceite"
    description: "Variante por volumen del envase de aceite"
    attributes:
      - "volumen"
    combinations:
      - volumen: 1
        sku_suffix: "1L"
      - volumen: 4
        sku_suffix: "4L"
      - volumen: 20
        sku_suffix: "20L"
        
  - id: "pastillas-aplicacion"
    name: "Aplicación de Pastillas de Freno"
    description: "Variante por aplicación de vehículo para pastillas de freno"
    attributes:
      - "aplicacion_vehiculo"
      - "posicion"
    combinations:
      - aplicacion_vehiculo: "Volkswagen"
        posicion: "Delantera"
        sku_suffix: "VW-DEL"
      - aplicacion_vehiculo: "Volkswagen"
        posicion: "Trasera"
        sku_suffix: "VW-TRA"
      - aplicacion_vehiculo: "Fiat"
        posicion: "Delantera"
        sku_suffix: "FIA-DEL"
      - aplicacion_vehiculo: "Fiat"
        posicion: "Trasera"
        sku_suffix: "FIA-TRA"
      - aplicacion_vehiculo: "Chevrolet"
        posicion: "Delantera"
        sku_suffix: "CHE-DEL"
      - aplicacion_vehiculo: "Chevrolet"
        posicion: "Trasera"
        sku_suffix: "CHE-TRA"
        
  - id: "amortiguador-posicion"
    name: "Posición de Amortiguador"
    description: "Variante por posición del amortiguador en el vehículo"
    attributes:
      - "posicion"
      - "aplicacion_vehiculo"
    combinations:
      - posicion: "Delantera Izquierda"
        aplicacion_vehiculo: "Renault"
        sku_suffix: "REN-DI"
      - posicion: "Delantera Derecha"
        aplicacion_vehiculo: "Renault"
        sku_suffix: "REN-DD"
      - posicion: "Trasera Izquierda"
        aplicacion_vehiculo: "Renault"
        sku_suffix: "REN-TI"
      - posicion: "Trasera Derecha"
        aplicacion_vehiculo: "Renault"
        sku_suffix: "REN-TD"
      - posicion: "Delantera Izquierda"
        aplicacion_vehiculo: "Fiat"
        sku_suffix: "FIA-DI"
      - posicion: "Delantera Derecha"
        aplicacion_vehiculo: "Fiat"
        sku_suffix: "FIA-DD"
      - posicion: "Trasera Izquierda"
        aplicacion_vehiculo: "Fiat"
        sku_suffix: "FIA-TI"
      - posicion: "Trasera Derecha"
        aplicacion_vehiculo: "Fiat"
        sku_suffix: "FIA-TD"
        
  - id: "bateria-amperaje"
    name: "Amperaje de Batería"
    description: "Variante por amperaje y voltaje de la batería"
    attributes:
      - "amperaje"
      - "voltaje"
    combinations:
      - amperaje: 45
        voltaje: "12V"
        sku_suffix: "45AH-12V"
      - amperaje: 60
        voltaje: "12V"
        sku_suffix: "60AH-12V"
      - amperaje: 75
        voltaje: "12V"
        sku_suffix: "75AH-12V"
      - amperaje: 90
        voltaje: "12V"
        sku_suffix: "90AH-12V"
      - amperaje: 110
        voltaje: "12V"
        sku_suffix: "110AH-12V"
      - amperaje: 150
        voltaje: "12V"
        sku_suffix: "150AH-12V"
        
  - id: "bujia-aplicacion"
    name: "Aplicación de Bujía"
    description: "Variante por aplicación de vehículo para bujías"
    attributes:
      - "aplicacion_vehiculo"
      - "tipo_motor"
    combinations:
      - aplicacion_vehiculo: "Volkswagen"
        tipo_motor: "Naftero/Gasolina"
        sku_suffix: "VW-NAF"
      - aplicacion_vehiculo: "Ford"
        tipo_motor: "Naftero/Gasolina"
        sku_suffix: "FOR-NAF"
      - aplicacion_vehiculo: "Chevrolet"
        tipo_motor: "Naftero/Gasolina"
        sku_suffix: "CHE-NAF"
      - aplicacion_vehiculo: "Fiat"
        tipo_motor: "Naftero/Gasolina"
        sku_suffix: "FIA-NAF"
      - aplicacion_vehiculo: "Renault"
        tipo_motor: "Naftero/Gasolina"
        sku_suffix: "REN-NAF"
        
  - id: "liquido-freno-volumen"
    name: "Volumen de Líquido de Freno"
    description: "Variante por volumen de envase de líquido de freno"
    attributes:
      - "volumen"
    combinations:
      - volumen: 0.25
        sku_suffix: "250"
      - volumen: 0.5
        sku_suffix: "500"
      - volumen: 1
        sku_suffix: "1000"
