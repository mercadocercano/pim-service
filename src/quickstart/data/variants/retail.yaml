business_type: "retail"
variants:
  - id: "color-size"
    name: "Color y Talla"
    description: "Variante por color y talla del producto"
    attributes:
      - "color"
      - "size"
    combinations:
      - color: "Negro"
        size: "S"
        sku_suffix: "BLK-S"
      - color: "Negro"
        size: "M"
        sku_suffix: "BLK-M"
      - color: "Negro"
        size: "L"
        sku_suffix: "BLK-L"
      - color: "Negro"
        size: "XL"
        sku_suffix: "BLK-XL"
      - color: "Blanco"
        size: "S"
        sku_suffix: "WHT-S"
      - color: "Blanco"
        size: "M"
        sku_suffix: "WHT-M"
      - color: "Blanco"
        size: "L"
        sku_suffix: "WHT-L"
      - color: "Blanco"
        size: "XL"
        sku_suffix: "WHT-XL"
      - color: "Azul"
        size: "S"
        sku_suffix: "BLU-S"
      - color: "Azul"
        size: "M"
        sku_suffix: "BLU-M"
      - color: "Azul"
        size: "L"
        sku_suffix: "BLU-L"
      - color: "Azul"
        size: "XL"
        sku_suffix: "BLU-XL"

  - id: "color-material"
    name: "Color y Material"
    description: "Variante por color y material del producto"
    attributes:
      - "color"
      - "material"
    combinations:
      - color: "Negro"
        material: "Cuero"
        sku_suffix: "BLK-LTH"
      - color: "Negro"
        material: "Cuero Sintético"
        sku_suffix: "BLK-SYN"
      - color: "Marrón"
        material: "Cuero"
        sku_suffix: "BRN-LTH"
      - color: "Marrón"
        material: "Cuero Sintético"
        sku_suffix: "BRN-SYN"
      - color: "Blanco"
        material: "Cuero"
        sku_suffix: "WHT-LTH"
      - color: "Blanco"
        material: "Cuero Sintético"
        sku_suffix: "WHT-SYN"

  - id: "size-weight"
    name: "Tamaño y Peso"
    description: "Variante por tamaño y peso del producto"
    attributes:
      - "size"
      - "weight"
    combinations:
      - size: "Pequeño"
        weight: 500
        sku_suffix: "SM-500G"
      - size: "Mediano"
        weight: 1000
        sku_suffix: "MD-1KG"
      - size: "Grande"
        weight: 2000
        sku_suffix: "LG-2KG"
      - size: "Extra Grande"
        weight: 5000
        sku_suffix: "XL-5KG"

  - id: "color-only"
    name: "Solo Color"
    description: "Variante únicamente por color"
    attributes:
      - "color"
    combinations:
      - color: "Negro"
        sku_suffix: "BLK"
      - color: "Blanco"
        sku_suffix: "WHT"
      - color: "Gris"
        sku_suffix: "GRY"
      - color: "Rojo"
        sku_suffix: "RED"
      - color: "Azul"
        sku_suffix: "BLU"
      - color: "Verde"
        sku_suffix: "GRN"
      - color: "Amarillo"
        sku_suffix: "YLW"
      - color: "Rosa"
        sku_suffix: "PNK"
      - color: "Morado"
        sku_suffix: "PRP"
      - color: "Marrón"
        sku_suffix: "BRN"

  - id: "size-only"
    name: "Solo Talla"
    description: "Variante únicamente por talla"
    attributes:
      - "size"
    combinations:
      - size: "XS"
        sku_suffix: "XS"
      - size: "S"
        sku_suffix: "S"
      - size: "M"
        sku_suffix: "M"
      - size: "L"
        sku_suffix: "L"
      - size: "XL"
        sku_suffix: "XL"
      - size: "XXL"
        sku_suffix: "XXL"
      - size: "XXXL"
        sku_suffix: "XXXL"

  - id: "material-only"
    name: "Solo Material"
    description: "Variante únicamente por material"
    attributes:
      - "material"
    combinations:
      - material: "Algodón"
        sku_suffix: "COT"
      - material: "Poliéster"
        sku_suffix: "POL"
      - material: "Lana"
        sku_suffix: "WOL"
      - material: "Cuero"
        sku_suffix: "LTH"
      - material: "Metal"
        sku_suffix: "MTL"
      - material: "Plástico"
        sku_suffix: "PLS"
      - material: "Madera"
        sku_suffix: "WOD"
      - material: "Vidrio"
        sku_suffix: "GLS"

  - id: "fragrance-texture"
    name: "Fragancia y Textura"
    description: "Variante por fragancia y textura (productos de belleza)"
    attributes:
      - "fragrance"
      - "texture"
    combinations:
      - fragrance: "Floral"
        texture: "Cremosa"
        sku_suffix: "FLR-CRM"
      - fragrance: "Floral"
        texture: "Líquida"
        sku_suffix: "FLR-LIQ"
      - fragrance: "Frutal"
        texture: "Cremosa"
        sku_suffix: "FRT-CRM"
      - fragrance: "Frutal"
        texture: "Líquida"
        sku_suffix: "FRT-LIQ"
      - fragrance: "Cítrico"
        texture: "Gel"
        sku_suffix: "CIT-GEL"
      - fragrance: "Cítrico"
        texture: "Espuma"
        sku_suffix: "CIT-FOM"
      - fragrance: "Sin fragancia"
        texture: "Cremosa"
        sku_suffix: "UNS-CRM"
      - fragrance: "Sin fragancia"
        texture: "Líquida"
        sku_suffix: "UNS-LIQ"

  - id: "gender-age"
    name: "Género y Edad"
    description: "Variante por género y grupo de edad"
    attributes:
      - "gender"
      - "age-group"
    combinations:
      - gender: "Masculino"
        age-group: "Adultos (18-64 años)"
        sku_suffix: "M-ADT"
      - gender: "Femenino"
        age-group: "Adultos (18-64 años)"
        sku_suffix: "F-ADT"
      - gender: "Niños"
        age-group: "Niños (3-12 años)"
        sku_suffix: "B-KID"
      - gender: "Niñas"
        age-group: "Niños (3-12 años)"
        sku_suffix: "G-KID"
      - gender: "Unisex"
        age-group: "Adolescentes (13-17 años)"
        sku_suffix: "U-TEN"
      - gender: "Unisex"
        age-group: "Adultos (18-64 años)"
        sku_suffix: "U-ADT"

  - id: "warranty-origin"
    name: "Garantía y Origen"
    description: "Variante por período de garantía y origen"
    attributes:
      - "warranty"
      - "brand-origin"
    combinations:
      - warranty: "1 año"
        brand-origin: "Nacional"
        sku_suffix: "1Y-NAT"
      - warranty: "1 año"
        brand-origin: "Importado"
        sku_suffix: "1Y-IMP"
      - warranty: "2 años"
        brand-origin: "Nacional"
        sku_suffix: "2Y-NAT"
      - warranty: "2 años"
        brand-origin: "Importado"
        sku_suffix: "2Y-IMP"
      - warranty: "3 años"
        brand-origin: "Nacional"
        sku_suffix: "3Y-NAT"
      - warranty: "3 años"
        brand-origin: "Importado"
        sku_suffix: "3Y-IMP"

  - id: "season-gender"
    name: "Temporada y Género"
    description: "Variante por temporada y género"
    attributes:
      - "season"
      - "gender"
    combinations:
      - season: "Primavera"
        gender: "Masculino"
        sku_suffix: "SPR-M"
      - season: "Primavera"
        gender: "Femenino"
        sku_suffix: "SPR-F"
      - season: "Verano"
        gender: "Masculino"
        sku_suffix: "SUM-M"
      - season: "Verano"
        gender: "Femenino"
        sku_suffix: "SUM-F"
      - season: "Otoño"
        gender: "Masculino"
        sku_suffix: "AUT-M"
      - season: "Otoño"
        gender: "Femenino"
        sku_suffix: "AUT-F"
      - season: "Invierno"
        gender: "Masculino"
        sku_suffix: "WIN-M"
      - season: "Invierno"
        gender: "Femenino"
        sku_suffix: "WIN-F" 