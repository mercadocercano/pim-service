business_type: "toys-games"
variants:
  - id: "color-talle"
    name: "Color y Talle"
    description: "Variante por color y talle para juguetes de ropa o disfraces infantiles"
    attributes:
      - "color"
      - "talle"
    combinations:
      - color: "Rojo"
        talle: "S"
        sku_suffix: "RED-S"
      - color: "Rojo"
        talle: "M"
        sku_suffix: "RED-M"
      - color: "Rojo"
        talle: "L"
        sku_suffix: "RED-L"
      - color: "Azul"
        talle: "S"
        sku_suffix: "BLU-S"
      - color: "Azul"
        talle: "M"
        sku_suffix: "BLU-M"
      - color: "Azul"
        talle: "L"
        sku_suffix: "BLU-L"
      - color: "Rosa"
        talle: "S"
        sku_suffix: "PNK-S"
      - color: "Rosa"
        talle: "M"
        sku_suffix: "PNK-M"
      - color: "Rosa"
        talle: "L"
        sku_suffix: "PNK-L"

  - id: "edad-tema"
    name: "Edad Recomendada y Tema"
    description: "Variante por edad recomendada y tema del juguete"
    attributes:
      - "edad_recomendada"
      - "tema"
    combinations:
      - edad_recomendada: "0-12 meses"
        tema: "Animales"
        sku_suffix: "0-12M-ANM"
      - edad_recomendada: "0-12 meses"
        tema: "Música"
        sku_suffix: "0-12M-MUS"
      - edad_recomendada: "1-3 años"
        tema: "Animales"
        sku_suffix: "1-3Y-ANM"
      - edad_recomendada: "1-3 años"
        tema: "Música"
        sku_suffix: "1-3Y-MUS"
      - edad_recomendada: "1-3 años"
        tema: "Construcción"
        sku_suffix: "1-3Y-BLD"
      - edad_recomendada: "3-6 años"
        tema: "Construcción"
        sku_suffix: "3-6Y-BLD"
      - edad_recomendada: "3-6 años"
        tema: "Ciencias"
        sku_suffix: "3-6Y-SCI"
      - edad_recomendada: "6-9 años"
        tema: "Ciencias"
        sku_suffix: "6-9Y-SCI"
      - edad_recomendada: "6-9 años"
        tema: "Deportes"
        sku_suffix: "6-9Y-SPO"

  - id: "color-material"
    name: "Color y Material"
    description: "Variante por color y material del juguete"
    attributes:
      - "color"
      - "material"
    combinations:
      - color: "Multicolor"
        material: "Plástico"
        sku_suffix: "MLT-PLS"
      - color: "Multicolor"
        material: "Madera"
        sku_suffix: "MLT-WOD"
      - color: "Rojo"
        material: "Plástico"
        sku_suffix: "RED-PLS"
      - color: "Azul"
        material: "Plástico"
        sku_suffix: "BLU-PLS"
      - color: "Verde"
        material: "Plástico"
        sku_suffix: "GRN-PLS"
      - color: "Natural"
        material: "Madera"
        sku_suffix: "NAT-WOD"
      - color: "Pintado"
        material: "Madera"
        sku_suffix: "PNT-WOD"

  - id: "cantidad-piezas-edad"
    name: "Cantidad de Piezas y Edad"
    description: "Variante por cantidad de piezas y edad recomendada"
    attributes:
      - "cantidad_piezas"
      - "edad_recomendada"
    combinations:
      - cantidad_piezas: 10
        edad_recomendada: "1-3 años"
        sku_suffix: "10P-TOD"
      - cantidad_piezas: 20
        edad_recomendada: "1-3 años"
        sku_suffix: "20P-TOD"
      - cantidad_piezas: 50
        edad_recomendada: "3-6 años"
        sku_suffix: "50P-KID"
      - cantidad_piezas: 100
        edad_recomendada: "3-6 años"
        sku_suffix: "100P-KID"
      - cantidad_piezas: 200
        edad_recomendada: "6-9 años"
        sku_suffix: "200P-JUN"
      - cantidad_piezas: 500
        edad_recomendada: "+9 años"
        sku_suffix: "500P-ADV"

  - id: "tiempo-jugadores"
    name: "Tiempo de Juego y Cantidad de Jugadores"
    description: "Variante por tiempo de juego y cantidad de jugadores para juegos de mesa"
    attributes:
      - "tiempo_juego"
      - "cantidad_jugadores"
    combinations:
      - tiempo_juego: "15-30 minutos"
        cantidad_jugadores: "2-4"
        sku_suffix: "30M-4P"
      - tiempo_juego: "15-30 minutos"
        cantidad_jugadores: "2-6"
        sku_suffix: "30M-6P"
      - tiempo_juego: "30-60 minutos"
        cantidad_jugadores: "2-4"
        sku_suffix: "60M-4P"
      - tiempo_juego: "30-60 minutos"
        cantidad_jugadores: "2-6"
        sku_suffix: "60M-6P"
      - tiempo_juego: "60-120 minutos"
        cantidad_jugadores: "2-4"
        sku_suffix: "120M-4P"
      - tiempo_juego: "60-120 minutos"
        cantidad_jugadores: "2-6"
        sku_suffix: "120M-6P"

  - id: "color-only"
    name: "Solo Color"
    description: "Variante únicamente por color del juguete"
    attributes:
      - "color"
    combinations:
      - color: "Rojo"
        sku_suffix: "RED"
      - color: "Azul"
        sku_suffix: "BLU"
      - color: "Verde"
        sku_suffix: "GRN"
      - color: "Amarillo"
        sku_suffix: "YLW"
      - color: "Rosa"
        sku_suffix: "PNK"
      - color: "Naranja"
        sku_suffix: "ORG"
      - color: "Morado"
        sku_suffix: "PRP"
      - color: "Multicolor"
        sku_suffix: "MLT"

  - id: "licencia-edad"
    name: "Licencia y Edad"
    description: "Variante por licencia y edad recomendada para juguetes de personajes"
    attributes:
      - "licencia"
      - "edad_recomendada"
    combinations:
      - licencia: "Disney"
        edad_recomendada: "1-3 años"
        sku_suffix: "DIS-TOD"
      - licencia: "Disney"
        edad_recomendada: "3-6 años"
        sku_suffix: "DIS-KID"
      - licencia: "Marvel"
        edad_recomendada: "3-6 años"
        sku_suffix: "MVL-KID"
      - licencia: "Marvel"
        edad_recomendada: "6-9 años"
        sku_suffix: "MVL-JUN"
      - licencia: "Star Wars"
        edad_recomendada: "6-9 años"
        sku_suffix: "STW-JUN"
      - licencia: "Star Wars"
        edad_recomendada: "+9 años"
        sku_suffix: "STW-ADV"

  - id: "nivel-dificultad-edad"
    name: "Nivel de Dificultad y Edad"
    description: "Variante por nivel de dificultad y edad recomendada para juegos educativos"
    attributes:
      - "nivel_dificultad"
      - "edad_recomendada"
    combinations:
      - nivel_dificultad: "Fácil"
        edad_recomendada: "3-6 años"
        sku_suffix: "EAS-KID"
      - nivel_dificultad: "Fácil"
        edad_recomendada: "6-9 años"
        sku_suffix: "EAS-JUN"
      - nivel_dificultad: "Intermedio"
        edad_recomendada: "6-9 años"
        sku_suffix: "MED-JUN"
      - nivel_dificultad: "Intermedio"
        edad_recomendada: "+9 años"
        sku_suffix: "MED-ADV"
      - nivel_dificultad: "Avanzado"
        edad_recomendada: "+9 años"
        sku_suffix: "ADV-ADV"
      - nivel_dificultad: "Avanzado"
        edad_recomendada: "+12 años"
        sku_suffix: "ADV-TEN"
