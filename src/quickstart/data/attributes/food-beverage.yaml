business_type: "food-beverage"
attributes:
  - id: "product-type"
    name: "Tipo de Producto"
    type: "select"
    required: true
    description: "Tipo general de alimento o bebida"
    values:
      - "Alimento"
      - "Bebida"
      - "Snack"
      - "Lácteo"
      - "Panificado"
      - "Fiambre"
      - "Congelado"
      - "Fresco"
      - "Conserva"
      - "Dulce"
      - "Salado"
      - "Otro"

  - id: "brand-origin"
    name: "Origen de Marca"
    type: "select"
    required: false
    description: "Origen de la marca"
    values:
      - "Nacional"
      - "Importado"
      - "Elaboración Argentina"
      - "Marca Propia"

  - id: "main-ingredient"
    name: "Ingrediente Principal"
    type: "select"
    required: false
    description: "Ingrediente predominante en el producto"
    values:
      - "Trigo"
      - "Maíz"
      - "Arroz"
      - "Soja"
      - "Leche"
      - "Carne Vacuna"
      - "Carne de Pollo"
      - "Carne de Cerdo"
      - "Pescado"
      - "Fruta"
      - "Verdura"
      - "Azúcar"
      - "Cacao"
      - "Agua"
      - "Cebada"
      - "Lúpulo"
      - "Uva"
      - "Papa"
      - "Queso"
      - "Huevo"
      - "Aceite"
      - "Otro"

  - id: "flavor"
    name: "Sabor"
    type: "select"
    required: false
    description: "Sabor principal del producto"
    values:
      - "Clásico"
      - "Chocolate"
      - "Vainilla"
      - "Frutilla"
      - "Limón"
      - "Naranja"
      - "Manzana"
      - "Dulce de Leche"
      - "Queso"
      - "Jamón"
      - "Salame"
      - "Picante"
      - "Natural"
      - "Sin sabor"
      - "Otro"

  - id: "package-type"
    name: "Tipo de Envase"
    type: "select"
    required: false
    description: "Tipo de envase o presentación"
    values:
      - "Botella"
      - "Lata"
      - "Tetra Brik"
      - "Bolsa"
      - "Caja"
      - "Bandeja"
      - "Frasco"
      - "Pote"
      - "Pack"
      - "A granel"
      - "Otro"

  - id: "net-weight"
    name: "Peso Neto"
    type: "number"
    required: false
    description: "Peso neto del producto en gramos"
    unit: "g"
    min_value: 0
    max_value: 20000

  - id: "net-volume"
    name: "Volumen Neto"
    type: "number"
    required: false
    description: "Volumen neto del producto en mililitros"
    unit: "ml"
    min_value: 0
    max_value: 10000

  - id: "servings"
    name: "Porciones"
    type: "number"
    required: false
    description: "Cantidad de porciones por envase"
    min_value: 1
    max_value: 50

  - id: "expiration-date"
    name: "Fecha de Vencimiento"
    type: "date"
    required: true
    description: "Fecha de vencimiento del producto"

  - id: "origin"
    name: "Origen"
    type: "select"
    required: false
    description: "Lugar de origen o elaboración"
    values:
      - "Argentina"
      - "Buenos Aires"
      - "Córdoba"
      - "Santa Fe"
      - "Mendoza"
      - "Patagonia"
      - "Cuyo"
      - "Noroeste"
      - "Noreste"
      - "Importado"
      - "Otro"

  - id: "organic"
    name: "Orgánico"
    type: "boolean"
    required: false
    description: "Producto certificado como orgánico"

  - id: "gluten-free"
    name: "Sin TACC (Apto Celíacos)"
    type: "boolean"
    required: false
    description: "Producto libre de gluten"

  - id: "vegan"
    name: "Apto Vegano"
    type: "boolean"
    required: false
    description: "Producto apto para veganos"

  - id: "vegetarian"
    name: "Apto Vegetariano"
    type: "boolean"
    required: false
    description: "Producto apto para vegetarianos"

  - id: "lactose-free"
    name: "Sin Lactosa"
    type: "boolean"
    required: false
    description: "Producto libre de lactosa"

  - id: "sugar-free"
    name: "Sin Azúcar"
    type: "boolean"
    required: false
    description: "Producto sin azúcar agregada"

  - id: "low-sodium"
    name: "Bajo en Sodio"
    type: "boolean"
    required: false
    description: "Producto bajo en sodio"

  - id: "preservatives-free"
    name: "Sin Conservantes"
    type: "boolean"
    required: false
    description: "Producto sin conservantes artificiales"

  - id: "refrigeration-required"
    name: "Requiere Refrigeración"
    type: "boolean"
    required: false
    description: "El producto debe mantenerse refrigerado"

  - id: "alcoholic"
    name: "Contiene Alcohol"
    type: "boolean"
    required: false
    description: "El producto contiene alcohol"

  - id: "abv"
    name: "% Alcohol (ABV)"
    type: "number"
    required: false
    description: "Porcentaje de alcohol por volumen (solo bebidas alcohólicas)"
    unit: "%"
    min_value: 0
    max_value: 60

  - id: "nutritional-info"
    name: "Información Nutricional"
    type: "text"
    required: false
    description: "Resumen de información nutricional por porción"
    placeholder: "ej: 120 kcal, 2g proteínas, 5g grasas, 20g hidratos"

  - id: "certifications"
    name: "Certificaciones"
    type: "select"
    required: false
    description: "Certificaciones del producto"
    values:
      - "Sin TACC"
      - "Orgánico"
      - "Alimentos Argentinos"
      - "Sello Calidad INTA"
      - "ISO 22000"
      - "BPM"
      - "Libre de Lactosa"
      - "Apto Vegano"
      - "Apto Kosher"
      - "Apto Halal"
      - "Otro"

  - id: "storage-instructions"
    name: "Instrucciones de Conservación"
    type: "text"
    required: false
    description: "Recomendaciones para conservar el producto"
    placeholder: "ej: Conservar en lugar fresco y seco, refrigerar luego de abrir"

  - id: "preparation-instructions"
    name: "Instrucciones de Preparación"
    type: "text"
    required: false
    description: "Modo de preparación o consumo"
    placeholder: "ej: Listo para consumir, calentar 2 minutos en microondas"
