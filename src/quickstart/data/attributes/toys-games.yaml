business_type: "toys-games"
attributes:
  # Atributos generales
  - id: "marca"
    name: "Marca"
    type: "string"
    required: true
    filterable: true
    searchable: true
    
  - id: "edad_recomendada"
    name: "Edad Recomendada"
    type: "enum"
    required: true
    filterable: true
    options:
      - "0-12 meses"
      - "1-3 años"
      - "3-6 años"
      - "6-9 años"
      - "9-12 años"
      - "+12 años"
      - "+18 años"
      
  - id: "color"
    name: "Color"
    type: "string"
    required: true
    filterable: true
    
  - id: "material"
    name: "Material"
    type: "string"
    required: false
    filterable: true
    
  # Atributos específicos
  - id: "dimensiones"
    name: "Dimensiones"
    type: "string"
    required: false
    
  - id: "peso"
    name: "Peso"
    type: "number"
    required: false
    unit: "g"
    
  - id: "cantidad_piezas"
    name: "Cantidad de Piezas"
    type: "number"
    required: false
    filterable: true
    
  - id: "tiempo_juego"
    name: "Tiempo de Juego"
    type: "string"
    required: false
    filterable: true
    
  - id: "cantidad_jugadores"
    name: "Cantidad de Jugadores"
    type: "string"
    required: false
    filterable: true
    
  - id: "tipo_pilas"
    name: "Tipo de Pilas"
    type: "enum"
    required: false
    options:
      - "AA"
      - "AAA"
      - "C"
      - "D"
      - "9V"
      - "Recargable"
      - "No requiere"
      
  - id: "pilas_incluidas"
    name: "Pilas Incluidas"
    type: "boolean"
    required: false
    
  - id: "licencia"
    name: "Licencia"
    type: "string"
    required: false
    filterable: true
    searchable: true
    
  - id: "genero"
    name: "Género"
    type: "enum"
    required: false
    filterable: true
    options:
      - "Unisex"
      - "Niños"
      - "Niñas"
    
  # Atributos educativos
  - id: "habilidades_desarrollo"
    name: "Habilidades que Desarrolla"
    type: "array"
    required: false
    filterable: true
    
  - id: "nivel_dificultad"
    name: "Nivel de Dificultad"
    type: "enum"
    required: false
    filterable: true
    options:
      - "Fácil"
      - "Intermedio"
      - "Avanzado"
      - "Experto"
      
  # Atributos de seguridad
  - id: "certificaciones"
    name: "Certificaciones"
    type: "array"
    required: false
    
  - id: "advertencias"
    name: "Advertencias de Seguridad"
    type: "text"
    required: false
    
  # Atributos comerciales
  - id: "origen"
    name: "País de Origen"
    type: "string"
    required: true
    filterable: true
    
  - id: "temporada"
    name: "Temporada"
    type: "enum"
    required: false
    filterable: true
    options:
      - "Todo el año"
      - "Navidad"
      - "Día del Niño"
      - "Verano"
      - "Invierno"
      
  - id: "tipo_juguete"
    name: "Tipo de Juguete"
    type: "enum"
    required: true
    filterable: true
    options:
      - "Juguete Educativo"
      - "Juguete de Construcción"
      - "Juguete de Acción"
      - "Juego de Mesa"
      - "Juguete Electrónico"
      - "Juguete para Exterior"
      - "Muñeco/Muñeca"
      - "Peluche"
      - "Arte y Manualidades"
      - "Disfraz"
      
  - id: "idioma"
    name: "Idioma"
    type: "enum"
    required: false
    filterable: true
    options:
      - "Español"
      - "Inglés"
      - "Multilingüe"
      - "No aplica"
