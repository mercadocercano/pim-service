business_type: "pet-supplies"
attributes:
  - id: "color"
    name: "Color"
    type: "select"
    required: false
    description: "Color del producto"
    values:
      - "Negro"
      - "Gris"
      - "Blanco"
      - "Rojo"
      - "Azul"
      - "Verde"
      - "Amarillo"
      - "Naranja"
      - "Rosa"
      - "Violeta"
      - "Marrón"
      - "Beige"
      - "Multicolor"
      
  - id: "material"
    name: "Material"
    type: "select"
    required: false
    description: "Material principal del producto"
    values:
      - "Plástico"
      - "Metal"
      - "Tela"
      - "Cuero"
      - "Cuero sintético"
      - "Goma"
      - "Silicona"
      - "Madera"
      - "Cerámica"
      - "Acero inoxidable"
      - "Peluche"
      - "Algodón"
      - "Poliéster"
      - "Nylon"
      
  - id: "peso_producto"
    name: "Peso del Producto"
    type: "number"
    required: false
    description: "Peso del producto en gramos"
    unit: "g"
    min_value: 0
    max_value: 50000
    
  - id: "tamano"
    name: "Tamaño"
    type: "select"
    required: false
    description: "Tamaño del producto"
    values:
      - "XS"
      - "S"
      - "M"
      - "L"
      - "XL"
      - "XXL"
      - "Único"
      
  - id: "medidas"
    name: "Medidas"
    type: "text"
    required: false
    description: "Dimensiones del producto (largo x ancho x alto)"
    placeholder: "Ej: 40cm x 30cm x 15cm"
    
  - id: "tipo_mascota"
    name: "Tipo de Mascota"
    type: "select"
    required: false
    description: "Tipo de mascota para la que está diseñado el producto"
    values:
      - "Perro"
      - "Gato"
      - "Ave"
      - "Pez"
      - "Roedor"
      - "Reptil"
      - "Múltiples mascotas"
      
  - id: "tamano_mascota"
    name: "Tamaño de Mascota"
    type: "multiselect"
    required: false
    description: "Tamaño de mascota recomendado para el producto"
    values:
      - "Toy/Mini (1-5 kg)"
      - "Pequeño (5-10 kg)"
      - "Mediano (10-25 kg)"
      - "Grande (25-45 kg)"
      - "Gigante (más de 45 kg)"
      
  - id: "edad_mascota"
    name: "Edad de Mascota"
    type: "multiselect"
    required: false
    description: "Edad de mascota recomendada para el producto"
    values:
      - "Cachorro/Gatito"
      - "Adulto"
      - "Senior"
      - "Todas las edades"
      
  - id: "raza_especifica"
    name: "Raza Específica"
    type: "text"
    required: false
    description: "Razas específicas para las que está diseñado el producto"
    placeholder: "Ej: Labrador, Bulldog, Siamés, etc."
    
  - id: "sabor"
    name: "Sabor"
    type: "select"
    required: false
    description: "Sabor del alimento o snack"
    values:
      - "Pollo"
      - "Carne"
      - "Pescado"
      - "Cerdo"
      - "Cordero"
      - "Pavo"
      - "Salmón"
      - "Atún"
      - "Vegetales"
      - "Mixto"
      - "Frutas"
      - "Sin sabor"
      
  - id: "peso_contenido"
    name: "Peso del Contenido"
    type: "number"
    required: false
    description: "Peso del contenido en gramos (para alimentos)"
    unit: "g"
    min_value: 0
    max_value: 30000
    
  - id: "volumen"
    name: "Volumen"
    type: "number"
    required: false
    description: "Volumen del producto en litros (para líquidos)"
    unit: "L"
    min_value: 0
    max_value: 50
    
  - id: "duracion"
    name: "Duración"
    type: "number"
    required: false
    description: "Duración del producto en días (para antiparasitarios, etc.)"
    unit: "días"
    min_value: 0
    max_value: 365
    
  - id: "cantidad_piezas"
    name: "Cantidad de Piezas"
    type: "number"
    required: false
    description: "Número de piezas incluidas en el paquete"
    unit: "u"
    min_value: 1
    max_value: 1000
    
  - id: "ingredientes_principales"
    name: "Ingredientes Principales"
    type: "multiselect"
    required: false
    description: "Ingredientes principales del producto (para alimentos)"
    values:
      - "Pollo"
      - "Carne vacuna"
      - "Cerdo"
      - "Cordero"
      - "Pescado"
      - "Arroz"
      - "Maíz"
      - "Trigo"
      - "Verduras"
      - "Frutas"
      - "Lácteos"
      - "Huevo"
      
  - id: "sin_cereales"
    name: "Sin Cereales"
    type: "boolean"
    required: false
    description: "Indica si el alimento no contiene cereales (grain free)"
    
  - id: "hipoalergenico"
    name: "Hipoalergénico"
    type: "boolean"
    required: false
    description: "Indica si el producto es hipoalergénico"
    
  - id: "edad_recomendada"
    name: "Edad Recomendada"
    type: "text"
    required: false
    description: "Edad recomendada para el uso del producto"
    placeholder: "Ej: A partir de 3 meses"
    
  - id: "tipo_pelaje"
    name: "Tipo de Pelaje"
    type: "multiselect"
    required: false
    description: "Tipo de pelaje para el que está indicado el producto"
    values:
      - "Pelo corto"
      - "Pelo medio"
      - "Pelo largo"
      - "Pelo rizado"
      - "Doble capa"
      - "Sin pelo"
      
  - id: "nivel_actividad"
    name: "Nivel de Actividad"
    type: "select"
    required: false
    description: "Nivel de actividad recomendado para el producto"
    values:
      - "Bajo"
      - "Moderado"
      - "Alto"
      - "Todos los niveles"
      
  - id: "esterilizado"
    name: "Para Mascotas Esterilizadas"
    type: "boolean"
    required: false
    description: "Indica si el producto es específico para mascotas esterilizadas"
    
  - id: "apto_todas_razas"
    name: "Apto para Todas las Razas"
    type: "boolean"
    required: false
    description: "Indica si el producto es apto para todas las razas"
    
  - id: "fabricacion_nacional"
    name: "Fabricación Nacional"
    type: "boolean"
    required: false
    description: "Indica si el producto es fabricado en Argentina"
    
  - id: "material_lavable"
    name: "Material Lavable"
    type: "boolean"
    required: false
    description: "Indica si el producto se puede lavar"
    
  - id: "uso_interior_exterior"
    name: "Uso Interior/Exterior"
    type: "select"
    required: false
    description: "Indica si el producto es para uso en interiores, exteriores o ambos"
    values:
      - "Interior"
      - "Exterior"
      - "Interior y Exterior"
