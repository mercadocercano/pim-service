  # ==========================================
  # SCHEMA VALIDATION ENDPOINTS
  # ==========================================
  /products/validate-schema:
    post:
      summary: Validar schema de archivo CSV
      tags: [Products]
      description: |
        Valida el schema de un archivo CSV antes de importar productos.
        Retorna una vista previa con visualización tipo Excel/Google Sheets
        mostrando errores, advertencias y sugerencias de mapeo.
      security:
        - BearerAuth: []
        - tenantId: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: Archivo CSV a validar
                max_rows:
                  type: integer
                  description: Número máximo de filas a analizar (default 10)
                  minimum: 1
                  maximum: 100
                  default: 10
                use_ai:
                  type: boolean
                  description: Usar IA para sugerencias inteligentes (futuro)
                  default: false
      responses:
        '200':
          description: Resultado de la validación del schema
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchemaValidationResponse'
        '400':
          description: Archivo inválido o formato incorrecto
        '401':
          description: No autorizado
        '413':
          description: Archivo demasiado grande
        '500':
          description: Error interno del servidor

  /products/apply-mapping:
    post:
      summary: Aplicar mapeo manual y re-validar
      tags: [Products]
      description: |
        Aplica mapeos manuales de columnas a una validación existente
        y actualiza el estado de validación.
      security:
        - BearerAuth: []
        - tenantId: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [validation_id, mappings]
              properties:
                validation_id:
                  type: string
                  format: uuid
                  description: ID de la validación previa
                mappings:
                  type: object
                  additionalProperties:
                    type: string
                  description: Mapeo de columnas CSV a campos del producto
                  example:
                    "Producto": "name"
                    "Codigo": "sku"
                    "Precio": "price"
      responses:
        '200':
          description: Validación actualizada con nuevos mapeos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SchemaValidationResponse'
        '400':
          description: Datos inválidos o mapeos incorrectos
        '404':
          description: Validación no encontrada o expirada
        '500':
          description: Error interno del servidor

