openapi: 3.1.0
info:
  title: Multi-Tenant PIM API
  version: 2.3.0
  description: |
    API para gestión de información de productos multi-tenant.

    ## Arquitectura Modular

    El sistema está organizado en módulos especializados:
    - **Health**: Estado del sistema
    - **Business Types**: Tipos de negocio
    - **Brands**: Gestión de marcas
    - **Products**: Gestión de productos y variantes
    - **Variants**: Gestión de variantes de productos (HITO 2.1)
    - **Categories**: Gestión de categorías
    - **Attributes**: Gestión de atributos
    - **Category-Attributes**: Relación categoría-atributo
    - **Global Catalog**: Catálogo global de productos con enrichment y quality score
    - **Global Catalog Public**: Endpoints públicos del catálogo global (sin auth)
    - **Product Requests**: Solicitudes de productos por tenants
    - **Quickstart**: Configuración rápida e importación desde global catalog
    - **Import**: Importación masiva con variantes (HITO 2.1)

    ## Actualizado v2.3.0

    - Global Catalog: CRUD completo, búsqueda por EAN, enrichment queue
    - Product Requests: Solicitudes de tenants con flujo approve/reject/fulfill
    - Quickstart: Import desde global catalog, import masivo por business type
    - Public endpoints: Búsqueda, sugerencias, facets sin autenticación
    - Variantes de productos: Product -> Variants con SKU único
    - Templates Quickstart: Configuración rápida por tipo de negocio
    - Importación con variantes: CSV/JSON con atributos dinámicos
    - Filtros avanzados: Criterios y paginación

servers:
  - url: /api/v1
    description: Base URL para la API v1
  - url: http://localhost:8080/api/v1
    description: Servidor local de desarrollo
  - url: http://localhost:8001/pim/api/v1
    description: A través de Kong API Gateway

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Token JWT para autenticación
    tenantId:
      type: apiKey
      in: header
      name: X-Tenant-ID
      description: ID del tenant para operaciones multi-tenant
    userRole:
      type: apiKey
      in: header
      name: X-User-Role
      description: |
        Rol del usuario para autorización:
        - `super_admin`: Acceso completo
        - `marketplace_admin`: Gestión de marketplace
        - `tenant_admin`: Administración del tenant
        - `tenant_user`: Usuario del tenant

  parameters:
    PageParam:
      name: page
      in: query
      description: "Número de página (default: 1)"
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1

    PageSizeParam:
      name: page_size
      in: query
      description: "Tamaño de página (default: 10, max: 100)"
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 10

    SortByParam:
      name: sort_by
      in: query
      description: "Campo de ordenamiento (default: created_at)"
      required: false
      schema:
        type: string
        default: "created_at"

    SortDirParam:
      name: sort_dir
      in: query
      description: "Dirección de ordenamiento (asc o desc, default: desc)"
      required: false
      schema:
        type: string
        enum: ["asc", "desc"]
        default: "desc"

    TenantIdHeader:
      name: X-Tenant-ID
      in: header
      required: true
      schema:
        type: string
        format: uuid
      description: ID del tenant

    UserRoleHeader:
      name: X-User-Role
      in: header
      required: false
      schema:
        type: string
        enum: ["super_admin", "marketplace_admin", "tenant_admin", "tenant_user"]
      description: Rol del usuario

  # ==========================================
  # SCHEMAS
  # ==========================================
  schemas:
    SchemaValidationResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: ID único de la validación
        is_valid:
          type: boolean
          description: Indica si el schema es completamente válido
        can_import:
          type: boolean
          description: Indica si se puede proceder con la importación
        columns:
          type: object
          additionalProperties:
            $ref: '#/components/schemas/ColumnValidation'
          description: Validación detallada por columna
        table_preview:
          $ref: '#/components/schemas/TablePreview'
          description: Vista previa de la tabla con colores de validación
        summary:
          $ref: '#/components/schemas/ValidationSummary'
          description: Resumen estadístico de la validación
        recommendations:
          type: array
          items:
            type: string
          description: Recomendaciones para mejorar el archivo
        suggested_mappings:
          type: object
          additionalProperties:
            type: string
          description: Mapeos sugeridos automáticamente
        created_at:
          type: string
          format: date-time
          description: Fecha de creación de la validación
        expires_at:
          type: string
          format: date-time
          description: Fecha de expiración (30 minutos)

    ColumnValidation:
      type: object
      properties:
        name:
          type: string
          description: Nombre de la columna
        index:
          type: integer
          description: Índice de la columna (0-based)
        status:
          type: string
          enum: ["valid", "warning", "error", "info"]
          description: Estado de validación
        type_expected:
          type: string
          description: Tipo de dato esperado según el schema
        type_detected:
          type: string
          description: Tipo de dato detectado automáticamente
        required:
          type: boolean
          description: Indica si la columna es requerida
        mapped_to:
          type: string
          description: Campo del producto al que está mapeada
        statistics:
          $ref: '#/components/schemas/ColumnStatistics'
        issues:
          type: array
          items:
            type: string
          description: Lista de problemas encontrados
        sample_values:
          type: array
          items:
            type: string
          description: Valores de muestra
        invalid_examples:
          type: array
          items:
            $ref: '#/components/schemas/InvalidExample'
          description: Ejemplos de valores inválidos

    ColumnStatistics:
      type: object
      properties:
        valid_count:
          type: integer
          description: Cantidad de valores válidos
        invalid_count:
          type: integer
          description: Cantidad de valores inválidos
        null_count:
          type: integer
          description: Cantidad de valores nulos/vacíos
        unique_count:
          type: integer
          description: Cantidad de valores únicos
        total_count:
          type: integer
          description: Total de valores analizados
        valid_rate:
          type: number
          format: float
          description: Porcentaje de valores válidos (0-100)

    InvalidExample:
      type: object
      properties:
        row:
          type: integer
          description: Número de fila (1-based)
        value:
          type: string
          description: Valor inválido
        reason:
          type: string
          description: Razón de la invalidez

    TablePreview:
      type: object
      properties:
        headers:
          type: array
          items:
            $ref: '#/components/schemas/HeaderInfo'
          description: Información de los encabezados
        rows:
          type: array
          items:
            $ref: '#/components/schemas/RowPreview'
          description: Filas de preview con validación

    HeaderInfo:
      type: object
      properties:
        name:
          type: string
          description: Nombre del header
        index:
          type: integer
          description: Índice de la columna
        status:
          type: string
          enum: ["valid", "warning", "error", "info"]
          description: Estado visual del header
        mapped_to:
          type: string
          description: Campo mapeado

    RowPreview:
      type: object
      properties:
        row_number:
          type: integer
          description: Número de fila (1-based)
        cells:
          type: array
          items:
            $ref: '#/components/schemas/CellValidation'
          description: Celdas de la fila
        row_status:
          type: string
          enum: ["valid", "warning", "error"]
          description: Estado general de la fila

    CellValidation:
      type: object
      properties:
        value:
          type: string
          description: Valor de la celda
        status:
          type: string
          enum: ["valid", "warning", "error", "info"]
          description: Estado visual de la celda
        message:
          type: string
          description: Mensaje de error/advertencia
        corrected_value:
          type: string
          description: Valor corregido sugerido
        column_index:
          type: integer
          description: Índice de la columna

    ValidationSummary:
      type: object
      properties:
        total_rows:
          type: integer
          description: Total de filas analizadas
        valid_rows:
          type: integer
          description: Filas completamente válidas
        rows_with_errors:
          type: integer
          description: Filas con errores
        rows_with_warnings:
          type: integer
          description: Filas con advertencias
        estimated_success_rate:
          type: number
          format: float
          description: Tasa de éxito estimada (0-100)
        total_columns:
          type: integer
          description: Total de columnas encontradas
        mapped_columns:
          type: integer
          description: Columnas mapeadas correctamente
        required_columns:
          type: integer
          description: Columnas requeridas según el schema

    # ==========================================
    # GLOBAL CATALOG SCHEMAS
    # ==========================================
    GlobalProduct:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
          example: "Coca-Cola 500ml"
        ean:
          type: string
          example: "7790895000782"
        brand:
          type: string
          example: "Coca-Cola"
        category:
          type: string
          example: "Bebidas"
        description:
          type: string
        price:
          type: number
          format: float
          example: 850.00
        image_url:
          type: string
          format: uri
        source:
          type: string
          example: "scraper_coto"
        business_type:
          type: string
          example: "almacen"
        tags:
          type: array
          items:
            type: string
        metadata:
          type: object
          additionalProperties: true
        quality_score:
          type: integer
          minimum: 0
          maximum: 100
          description: Puntaje de calidad del producto (0-100)
        is_verified:
          type: boolean
        is_active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    GlobalProductCreateRequest:
      type: object
      required: [name, business_type]
      properties:
        name:
          type: string
          example: "Coca-Cola 500ml"
        ean:
          type: string
          example: "7790895000782"
        brand:
          type: string
          example: "Coca-Cola"
        category:
          type: string
          example: "Bebidas"
        price:
          type: number
          format: float
          example: 850.00
        image_url:
          type: string
          format: uri
        source:
          type: string
          example: "scraper_coto"
        business_type:
          type: string
          example: "almacen"
        tags:
          type: array
          items:
            type: string
        metadata:
          type: object
          additionalProperties: true

    GlobalProductUpdateRequest:
      type: object
      properties:
        name:
          type: string
        ean:
          type: string
        brand:
          type: string
        category:
          type: string
        price:
          type: number
          format: float
        image_url:
          type: string
          format: uri
        source:
          type: string
        business_type:
          type: string
        tags:
          type: array
          items:
            type: string
        metadata:
          type: object
          additionalProperties: true
        is_verified:
          type: boolean
        is_active:
          type: boolean

    GlobalProductListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/GlobalProduct'
        total_count:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
        total_pages:
          type: integer
        can_request:
          type: boolean
          description: Indica si el tenant puede solicitar productos nuevos

    EnrichmentQueueResponse:
      type: object
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/GlobalProduct'
          description: Productos con quality_score menor a 70
        total_count:
          type: integer

    GlobalCatalogFacetsResponse:
      type: object
      properties:
        brands:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              count:
                type: integer
        categories:
          type: array
          items:
            type: object
            properties:
              name:
                type: string
              count:
                type: integer

    # ==========================================
    # PRODUCT REQUESTS SCHEMAS
    # ==========================================
    ProductRequestCreateRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          example: "Yerba Mate Playadito 1kg"
        brand:
          type: string
          example: "Playadito"
        category:
          type: string
          example: "Infusiones"
        description:
          type: string
          example: "Yerba mate suave con palo"
        business_type:
          type: string
          example: "almacen"

    ProductRequestCreateResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        message:
          type: string
          example: "Solicitud creada exitosamente"

    ProductRequestListResponse:
      type: object
      properties:
        items:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              tenant_id:
                type: string
                format: uuid
              name:
                type: string
              brand:
                type: string
              category:
                type: string
              description:
                type: string
              business_type:
                type: string
              status:
                type: string
                enum: ["pending", "approved", "rejected", "fulfilled"]
              admin_notes:
                type: string
              global_product_id:
                type: string
                format: uuid
              created_at:
                type: string
                format: date-time
              updated_at:
                type: string
                format: date-time
        pending_count:
          type: integer

    ProductRequestMetricsResponse:
      type: object
      properties:
        pending_requests:
          type: integer
        alert:
          type: boolean
          description: Indica si hay solicitudes que requieren atención urgente
        alert_level:
          type: string
          enum: ["none", "low", "medium", "high"]
          description: Nivel de alerta basado en cantidad y antigüedad

    ProductRequestResolveRequest:
      type: object
      required: [action]
      properties:
        action:
          type: string
          enum: ["approve", "reject", "fulfill"]
        admin_notes:
          type: string
          example: "Producto agregado al catálogo global"
        global_product_id:
          type: string
          format: uuid
          description: ID del producto global (requerido para action=fulfill)

    ProductRequestResolveResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        status:
          type: string
          enum: ["approved", "rejected", "fulfilled"]
        admin_notes:
          type: string
        global_product_id:
          type: string
          format: uuid

    # ==========================================
    # QUICKSTART SCHEMAS (nuevos)
    # ==========================================
    QuickstartFromTemplateRequest:
      type: object
      required: [template_id]
      properties:
        template_id:
          type: string
          format: uuid
        skip_existing:
          type: boolean
          default: true

    QuickstartImportFromBusinessTypeRequest:
      type: object
      required: [business_type]
      properties:
        business_type:
          type: string
          example: "almacen"
        limit:
          type: integer
          minimum: 1
          maximum: 500
          default: 100
        categories:
          type: array
          items:
            type: string
          description: Filtrar por categorías específicas

    QuickstartImportFromGlobalRequest:
      type: object
      required: [global_product_id]
      properties:
        global_product_id:
          type: string
          format: uuid

    QuickstartImportFromGlobalResponse:
      type: object
      properties:
        product_id:
          type: string
          format: uuid
        global_product_id:
          type: string
          format: uuid
        name:
          type: string
        brand:
          type: string
        category:
          type: string
        image_url:
          type: string
          format: uri
        price:
          type: number
          format: float

    QuickstartProgressResponse:
      type: object
      properties:
        total_products:
          type: integer
        total_categories:
          type: integer
        total_brands:
          type: integer
        has_products:
          type: boolean
        has_categories:
          type: boolean
        has_brands:
          type: boolean
        completion_percentage:
          type: integer
          minimum: 0
          maximum: 100

paths:
  # ==========================================
  # HEALTH ENDPOINTS
  # ==========================================
  /health:
    get:
      summary: Verificar el estado del sistema
      tags: [Health]
      description: Devuelve información sobre el estado de salud del sistema
      responses:
        '200':
          description: Estado del sistema
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "healthy"
                  timestamp:
                    type: string
                    format: date-time
                  database:
                    type: string
                    example: "connected"
        '500':
          description: Error interno del servidor

  # ==========================================
  # BUSINESS TYPES ENDPOINTS
  # ==========================================
  /business-types:
    get:
      summary: Listar tipos de negocio
      tags: [Business Types]
      description: Obtiene la lista de tipos de negocio disponibles
      security:
        - BearerAuth: []
        - tenantId: []
      parameters:
        - name: only_active
          in: query
          description: Solo tipos de negocio activos
          required: false
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: Lista de tipos de negocio
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                      format: uuid
                    code:
                      type: string
                    name:
                      type: string
                    description:
                      type: string
                    icon:
                      type: string
                    color:
                      type: string
                    is_active:
                      type: boolean
                    sort_order:
                      type: integer
        '401':
          description: No autorizado
        '500':
          description: Error interno del servidor

    post:
      summary: Crear tipo de negocio
      tags: [Business Types]
      description: Crea un nuevo tipo de negocio (solo administradores)
      security:
        - BearerAuth: []
        - tenantId: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, name]
              properties:
                code:
                  type: string
                  example: "RESTAURANT"
                name:
                  type: string
                  example: "Restaurante"
                description:
                  type: string
                  example: "Tipo de negocio para restaurantes"
                icon:
                  type: string
                  example: "restaurant"
                color:
                  type: string
                  example: "#ff5722"
                sort_order:
                  type: integer
                  example: 1
      responses:
        '201':
          description: Tipo de negocio creado exitosamente
        '400':
          description: Datos de entrada inválidos
        '401':
          description: No autorizado
        '409':
          description: Tipo de negocio ya existe
        '500':
          description: Error interno del servidor

  /business-types/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: ID del tipo de negocio

    get:
      summary: Obtener tipo de negocio por ID
      tags: [Business Types]
      security:
        - BearerAuth: []
        - tenantId: []
      responses:
        '200':
          description: Detalles del tipo de negocio
        '404':
          description: Tipo de negocio no encontrado
        '401':
          description: No autorizado
        '500':
          description: Error interno del servidor

    put:
      summary: Actualizar tipo de negocio
      tags: [Business Types]
      security:
        - BearerAuth: []
        - tenantId: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                icon:
                  type: string
                color:
                  type: string
                sort_order:
                  type: integer
      responses:
        '200':
          description: Tipo de negocio actualizado exitosamente
        '400':
          description: Datos de entrada inválidos
        '404':
          description: Tipo de negocio no encontrado
        '500':
          description: Error interno del servidor

    delete:
      summary: Eliminar tipo de negocio
      tags: [Business Types]
      security:
        - BearerAuth: []
        - tenantId: []
      responses:
        '204':
          description: Tipo de negocio eliminado
        '404':
          description: Tipo de negocio no encontrado
        '409':
          description: No se puede eliminar (tiene datos asociados)
        '500':
          description: Error interno del servidor

  # ==========================================
  # BRANDS ENDPOINTS
  # ==========================================
  /brands:
    get:
      summary: Listar marcas con filtros y paginación
      tags: [Brands]
      security:
        - BearerAuth: []
        - tenantId: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - $ref: '#/components/parameters/SortByParam'
        - $ref: '#/components/parameters/SortDirParam'
        - name: status
          in: query
          description: Estado de la marca
          schema:
            type: string
            enum: ["active", "inactive", "deleted"]
        - name: name
          in: query
          description: Búsqueda por nombre
          schema:
            type: string
        - name: description
          in: query
          description: Búsqueda por descripción
          schema:
            type: string
        - name: active
          in: query
          description: Solo marcas activas
          schema:
            type: boolean
      responses:
        '200':
          description: Lista paginada de marcas
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        name:
                          type: string
                        description:
                          type: string
                        website_url:
                          type: string
                        logo_url:
                          type: string
                        active:
                          type: boolean
                        created_at:
                          type: string
                          format: date-time
                        background_color:
                          type: string
                          nullable: true
                          description: Color de fondo de la marca en formato hex (#RRGGBB). Vacío si no definido.
                          example: "#FF6600"
                        text_color:
                          type: string
                          nullable: true
                          description: Color de texto de la marca en formato hex (#RRGGBB). Vacío si no definido.
                          example: "#FFFFFF"
                        typography:
                          type: string
                          nullable: true
                          description: Nombre de la fuente tipográfica (Google Fonts). Vacío si no definida.
                          example: "Roboto"
                  total_count:
                    type: integer
                  page:
                    type: integer
                  page_size:
                    type: integer
                  total_pages:
                    type: integer
        '400':
          description: Parámetros de filtrado inválidos
        '401':
          description: No autorizado

    post:
      summary: Crear nueva marca
      tags: [Brands]
      security:
        - BearerAuth: []
        - tenantId: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  example: "Samsung"
                description:
                  type: string
                  example: "Marca de electrónicos"
                website_url:
                  type: string
                  example: "https://samsung.com"
                logo_url:
                  type: string
                  example: "https://logo.com/samsung.png"
      responses:
        '201':
          description: Marca creada exitosamente
        '400':
          description: Datos de entrada inválidos
        '409':
          description: Marca ya existe
        '500':
          description: Error interno del servidor

  /brands/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid

    get:
      summary: Obtener marca por ID
      tags: [Brands]
      security:
        - BearerAuth: []
        - tenantId: []
