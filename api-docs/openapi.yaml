  # ==========================================
  # IMPORT WITH VARIANTS ENDPOINTS (HITO 2.1)
  # ==========================================
  /products/import:
    post:
      summary: Importar productos con variantes
      tags: [Import]
      description: |
        Importa productos con sus variantes desde CSV o JSON.

        El parser detecta automáticamente:
        - Columnas estándar (name, sku, price, category, brand)
        - Atributos dinámicos (potencia, voltaje, color, etc.)
        - Agrupa filas por product_name para crear variantes

        Formato CSV esperado:
        ```
        product_name,variant_sku,category,brand,potencia,voltaje,price
        Taladro Bosch,TALADRO-750W,Herramientas,Bosch,750W,220V,45000
        Taladro Bosch,TALADRO-1000W,Herramientas,Bosch,1000W,220V,65000
        ```
      security:
        - BearerAuth: []
        - tenantId: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Archivo CSV o JSON
                create_categories:
                  type: boolean
                  default: true
                  description: Crear categorías automáticamente si no existen
                create_brands:
                  type: boolean
                  default: true
                  description: Crear marcas automáticamente si no existen
          application/json:
            schema:
              type: object
              required:
                - products
              properties:
                products:
                  type: array
                  items:
                    type: object
                    properties:
                      product_name:
                        type: string
                      category_name:
                        type: string
                      brand_name:
                        type: string
                      variants:
                        type: array
                        items:
                          type: object
                          properties:
                            sku:
                              type: string
                            attributes:
                              type: object
                            price:
                              type: number
                create_categories:
                  type: boolean
                  default: true
                create_brands:
                  type: boolean
                  default: true
      responses:
        '200':
          description: Resultado de la importación
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  summary:
                    type: object
                    properties:
                      products_created:
                        type: integer
                      variants_created:
                        type: integer
                      categories_created:
                        type: integer
                      brands_created:
                        type: integer
                      products_skipped:
                        type: integer
                      errors:
                        type: array
                        items:
                          type: object
                          properties:
                            row:
                              type: integer
                            error:
                              type: string
        '400':
          description: Archivo inválido o formato incorrecto
        '401':
          description: No autorizado
        '500':
          description: Error interno del servidor

  # ==========================================
  # QUICKSTART TEMPLATES ENDPOINTS (HITO 2)
  # ==========================================
  /quickstart/templates:
    get:
      summary: Listar templates de quickstart disponibles
      tags: [Quickstart]
      description: |
        Obtiene la lista de templates predefinidos para configuración rápida.
        Cada template incluye categorías, marcas y estructura de catálogo
        para un tipo de negocio específico.
      security:
        - BearerAuth: []
        - tenantId: []
      parameters:
        - name: business_type
          in: query
          description: Filtrar por tipo de negocio
          schema:
            type: string
            example: "ferreteria"
      responses:
        '200':
          description: Lista de templates
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        name:
                          type: string
                          example: "Ferretería Básica"
                        business_type:
                          type: string
                          example: "ferreteria"
                        description:
                          type: string
                        categories_count:
                          type: integer
                          example: 6
                        brands_count:
                          type: integer
                          example: 12
                        is_active:
                          type: boolean
        '401':
          description: No autorizado
        '500':
          description: Error interno del servidor

  /quickstart/templates/{id}/apply:
    post:
      summary: Aplicar template de quickstart
      tags: [Quickstart]
      description: |
        Aplica un template predefinido al catálogo del tenant.
        Crea automáticamente categorías, marcas y estructura base.
      security:
        - BearerAuth: []
        - tenantId: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID del template a aplicar
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                skip_existing:
                  type: boolean
                  default: true
                  description: No crear si ya existe
      responses:
        '200':
          description: Template aplicado
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  results:
                    type: object
                    properties:
                      categories_created:
                        type: integer
                      brands_created:
                        type: integer
                      categories_skipped:
                        type: integer
                      brands_skipped:
                        type: integer
        '400':
          description: Error al aplicar template
        '404':
          description: Template no encontrado
        '500':
          description: Error interno del servidor

  # ==========================================
  # QUICKSTART NEW ENDPOINTS (v2.3.0)
  # ==========================================
  /quickstart/products/from-template:
    post:
      summary: Crear producto desde template
      tags: [Quickstart]
      description: |
        Crea un producto en el catálogo del tenant a partir de un template
        de quickstart predefinido.
      security:
        - BearerAuth: []
        - tenantId: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuickstartFromTemplateRequest'
      responses:
        '201':
          description: Producto creado desde template
        '400':
          description: Datos de entrada inválidos
        '401':
          description: No autorizado
        '404':
          description: Template no encontrado
        '500':
          description: Error interno del servidor

  /quickstart/products/import-from-business-type:
    post:
      summary: Import masivo por business type
      tags: [Quickstart]
      description: |
        Importa productos del catálogo global filtrando por tipo de negocio.
        Crea productos, categorías y marcas automáticamente en el tenant.
      security:
        - BearerAuth: []
        - tenantId: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuickstartImportFromBusinessTypeRequest'
      responses:
        '200':
          description: Resultado de la importación masiva
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  products_imported:
                    type: integer
                  categories_created:
                    type: integer
                  brands_created:
                    type: integer
                  errors:
                    type: array
                    items:
                      type: string
        '400':
          description: Datos de entrada inválidos
        '401':
          description: No autorizado
        '500':
          description: Error interno del servidor

  /quickstart/products/import-from-global:
    post:
      summary: Import individual desde global catalog
      tags: [Quickstart]
      description: |
        Importa un producto individual del catálogo global al catálogo del tenant.
        Crea el producto con toda su información (nombre, marca, categoría, imagen, precio).
      security:
        - BearerAuth: []
        - tenantId: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/QuickstartImportFromGlobalRequest'
      responses:
        '201':
          description: Producto importado exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuickstartImportFromGlobalResponse'
        '400':
          description: Datos de entrada inválidos
        '401':
          description: No autorizado
        '404':
          description: Producto global no encontrado
        '409':
          description: Producto ya existe en el catálogo del tenant
        '500':
          description: Error interno del servidor

  /quickstart/progress:
    get:
      summary: Progreso del quickstart
      tags: [Quickstart]
      description: |
        Retorna el progreso actual del quickstart del tenant,
        incluyendo cantidad de productos, categorías y marcas creadas.
      security:
        - BearerAuth: []
        - tenantId: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
      responses:
        '200':
          description: Progreso del quickstart
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuickstartProgressResponse'
        '401':
          description: No autorizado
        '500':
          description: Error interno del servidor

  # ==========================================
  # GLOBAL CATALOG ENDPOINTS (v2.3.0)
  # ==========================================
  /global-catalog/products:
    post:
      summary: Crear producto global
      tags: [Global Catalog]
      description: |
        Crea un producto en el catálogo global. Usado principalmente por scrapers
        y procesos de enrichment automatizado.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserRoleHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GlobalProductCreateRequest'
      responses:
        '201':
          description: Producto global creado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalProduct'
        '400':
          description: Datos de entrada inválidos
        '401':
          description: No autorizado
        '409':
          description: Producto con EAN duplicado
        '500':
          description: Error interno del servidor

    get:
      summary: Listar productos globales con filtros avanzados
      tags: [Global Catalog]
      description: |
        Lista productos del catálogo global con filtros avanzados.
        Soporta búsqueda por texto (ILIKE), filtros exactos y paginación.
      security:
        - BearerAuth: []
      parameters:
        - name: search
          in: query
          description: Búsqueda por nombre (ILIKE)
          schema:
            type: string
        - name: description
          in: query
          description: Búsqueda por descripción (ILIKE)
          schema:
            type: string
        - name: brand
          in: query
          description: Filtrar por marca exacta
          schema:
            type: string
        - name: category
          in: query
          description: Filtrar por categoría exacta
          schema:
            type: string
        - name: business_type
          in: query
          description: Filtrar por tipo de negocio
          schema:
            type: string
        - name: source
          in: query
          description: Filtrar por fuente (scraper)
          schema:
            type: string
        - name: ean
          in: query
          description: Filtrar por código EAN
          schema:
            type: string
        - name: is_verified
          in: query
          description: Solo productos verificados
          schema:
            type: boolean
        - name: is_active
          in: query
          description: Solo productos activos
          schema:
            type: boolean
        - name: min_quality
          in: query
          description: Quality score mínimo (0-100)
          schema:
            type: integer
            minimum: 0
            maximum: 100
        - name: max_quality
          in: query
          description: Quality score máximo (0-100)
          schema:
            type: integer
            minimum: 0
            maximum: 100
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
      responses:
        '200':
          description: Lista paginada de productos globales
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalProductListResponse'
        '400':
          description: Parámetros de filtrado inválidos
        '401':
          description: No autorizado
        '500':
          description: Error interno del servidor

  /global-catalog/products/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: ID del producto global

    get:
      summary: Obtener producto global por ID
      tags: [Global Catalog]
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Detalles del producto global
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalProduct'
        '404':
          description: Producto no encontrado
        '401':
          description: No autorizado
        '500':
          description: Error interno del servidor

    put:
      summary: Actualizar producto global
      tags: [Global Catalog]
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserRoleHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/GlobalProductUpdateRequest'
      responses:
        '200':
          description: Producto global actualizado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalProduct'
        '400':
          description: Datos de entrada inválidos
        '404':
          description: Producto no encontrado
        '401':
          description: No autorizado
        '500':
          description: Error interno del servidor

    delete:
      summary: Eliminar producto global
      tags: [Global Catalog]
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserRoleHeader'
      responses:
        '204':
          description: Producto global eliminado
        '404':
          description: Producto no encontrado
        '401':
          description: No autorizado
        '500':
          description: Error interno del servidor

  /global-catalog/products/search:
    get:
      summary: Búsqueda de productos por EAN
      tags: [Global Catalog]
      description: Busca productos en el catálogo global por código EAN.
      security:
        - BearerAuth: []
      parameters:
        - name: ean
          in: query
          required: true
          description: Código EAN del producto
          schema:
            type: string
      responses:
        '200':
          description: Producto encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalProduct'
        '404':
          description: Producto no encontrado por EAN
        '401':
          description: No autorizado
        '500':
          description: Error interno del servidor

  /global-catalog/enrichment-queue:
    get:
      summary: Cola de enrichment
      tags: [Global Catalog]
      description: |
        Retorna productos del catálogo global con quality_score menor a 70,
        priorizados para enrichment (mejora de datos).
      security:
        - BearerAuth: []
      parameters:
        - name: business_type
          in: query
          description: Filtrar por tipo de negocio
          schema:
            type: string
        - name: limit
          in: query
          description: Cantidad máxima de resultados
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: offset
          in: query
          description: Offset para paginación
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Productos pendientes de enrichment
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnrichmentQueueResponse'
        '401':
          description: No autorizado
        '500':
          description: Error interno del servidor

  # ==========================================
  # PRODUCT REQUESTS ENDPOINTS (v2.3.0)
  # ==========================================
  /global-catalog/product-requests:
    post:
      summary: Solicitar producto al catálogo global
      tags: [Product Requests]
      description: |
        Permite a un tenant solicitar la incorporación de un producto
        al catálogo global. El admin lo revisará y resolverá.
      security:
        - BearerAuth: []
        - tenantId: []
      parameters:
        - $ref: '#/components/parameters/TenantIdHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductRequestCreateRequest'
      responses:
        '201':
          description: Solicitud creada exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductRequestCreateResponse'
        '400':
          description: Datos de entrada inválidos
        '401':
          description: No autorizado
        '500':
          description: Error interno del servidor

    get:
      summary: Listar solicitudes pendientes
      tags: [Product Requests]
      description: |
        Lista las solicitudes de productos pendientes.
        Endpoint para administradores del marketplace.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserRoleHeader'
        - name: limit
          in: query
          description: Cantidad máxima de resultados
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: offset
          in: query
          description: Offset para paginación
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Lista de solicitudes pendientes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductRequestListResponse'
        '401':
          description: No autorizado
        '500':
          description: Error interno del servidor

  /global-catalog/product-requests/metrics:
    get:
      summary: Métricas de solicitudes (alarma)
      tags: [Product Requests]
      description: |
        Retorna métricas resumidas de las solicitudes pendientes,
        incluyendo nivel de alerta basado en cantidad y antigüedad.
      security:
        - BearerAuth: []
      parameters:
        - $ref: '#/components/parameters/UserRoleHeader'
      responses:
        '200':
          description: Métricas de solicitudes
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductRequestMetricsResponse'
        '401':
          description: No autorizado
        '500':
          description: Error interno del servidor

  /global-catalog/product-requests/{id}/resolve:
    put:
      summary: Resolver solicitud de producto
      tags: [Product Requests]
      description: |
        Permite al administrador resolver una solicitud de producto.
        Acciones disponibles: approve, reject, fulfill.
        Para fulfill se requiere global_product_id.
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID de la solicitud
        - $ref: '#/components/parameters/UserRoleHeader'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProductRequestResolveRequest'
      responses:
        '200':
          description: Solicitud resuelta
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ProductRequestResolveResponse'
        '400':
          description: Acción inválida o datos faltantes
        '401':
          description: No autorizado
        '404':
          description: Solicitud no encontrada
        '500':
          description: Error interno del servidor

  # ==========================================
  # PUBLIC GLOBAL CATALOG ENDPOINTS (v2.3.0)
  # ==========================================
  /public/global-catalog/health:
    get:
      summary: Health check público del catálogo global
      tags: [Global Catalog Public]
      description: Endpoint de salud público, no requiere autenticación.
      responses:
        '200':
          description: Estado del catálogo global
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "healthy"
                  service:
                    type: string
                    example: "global-catalog"
        '500':
          description: Error interno del servidor

  /public/global-catalog/search:
    get:
      summary: Búsqueda pública por EAN
      tags: [Global Catalog Public]
      description: |
        Busca productos en el catálogo global por código EAN.
        No requiere autenticación.
      parameters:
        - name: ean
          in: query
          required: true
          description: Código EAN del producto
          schema:
            type: string
      responses:
        '200':
          description: Producto encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalProduct'
        '404':
          description: Producto no encontrado
        '500':
          description: Error interno del servidor

  /public/global-catalog/suggestions:
    get:
      summary: Sugerencias de productos por business type
      tags: [Global Catalog Public]
      description: |
        Retorna sugerencias de productos del catálogo global
        filtrados por tipo de negocio. No requiere autenticación.
      parameters:
        - name: business_type
          in: query
          required: true
          description: Tipo de negocio para filtrar sugerencias
          schema:
            type: string
            example: "almacen"
        - name: limit
          in: query
          description: Cantidad máxima de sugerencias
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 10
      responses:
        '200':
          description: Lista de sugerencias
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      $ref: '#/components/schemas/GlobalProduct'
                  total_count:
                    type: integer
        '400':
          description: business_type es requerido
        '500':
          description: Error interno del servidor

  /public/global-catalog/products/ean/{ean}:
    get:
      summary: Obtener producto por EAN público
      tags: [Global Catalog Public]
      description: |
        Obtiene un producto del catálogo global por su código EAN.
        No requiere autenticación.
      parameters:
        - name: ean
          in: path
          required: true
          description: Código EAN del producto
          schema:
            type: string
            example: "7790895000782"
      responses:
        '200':
          description: Producto encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalProduct'
        '404':
          description: Producto no encontrado con ese EAN
        '500':
          description: Error interno del servidor

  /public/global-catalog/facets:
    get:
      summary: Marcas y categorías por business type
      tags: [Global Catalog Public]
      description: |
        Retorna las marcas y categorías disponibles en el catálogo global
        filtradas por tipo de negocio. Usado para construir filtros en el frontend.
        No requiere autenticación.
      parameters:
        - name: business_type
          in: query
          required: true
          description: Tipo de negocio para filtrar facets
          schema:
            type: string
            example: "almacen"
      responses:
        '200':
          description: Facets disponibles
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GlobalCatalogFacetsResponse'
        '400':
          description: business_type es requerido
        '500':
          description: Error interno del servidor
