openapi: 3.1.0
info:
  title: Multi-Tenant PIM API
  version: 1.0.0
  description: API para gestión de información de productos multi-tenant

servers:
  - url: /pim/api/v1
    description: Base URL para la API v1
  - url: http://localhost:8080/pim/api/v1
    description: Servidor local de desarrollo

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Token JWT para autenticación
    tenantId:
      type: apiKey
      in: header
      name: X-Tenant-ID
      description: ID del tenant para operaciones multi-tenant

  parameters:
    # Parámetros básicos de paginación y filtrado
    PageParam:
      name: page
      in: query
      description: "Número de página (default: 1)"
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    
    PageSizeParam:
      name: page_size
      in: query
      description: "Tamaño de página (default: 10, max: 100)"
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 10
    
    SortByParam:
      name: sort_by
      in: query
      description: "Campo de ordenamiento (default: created_at)"
      required: false
      schema:
        type: string
        default: "created_at"
    
    SortDirParam:
      name: sort_dir
      in: query
      description: "Dirección de ordenamiento (asc o desc, default: desc)"
      required: false
      schema:
        type: string
        enum: ["asc", "desc"]
        default: "desc"

    # Parámetros específicos para categorías
    CategoryStatusParam:
      name: status
      in: query
      description: Estado de la categoría
      required: false
      schema:
        type: string
        enum: ["ACTIVE", "INACTIVE"]
    
    CategoryParentIdParam:
      name: parent_id
      in: query
      description: ID del padre o null para categorías raíz
      required: false
      schema:
        type: string
        format: uuid
        nullable: true
    
    CategoryNameParam:
      name: name
      in: query
      description: "Búsqueda por nombre (LIKE)"
      required: false
      schema:
        type: string
    
    CategoryDescriptionParam:
      name: description
      in: query
      description: "Búsqueda por descripción (LIKE)"
      required: false
      schema:
        type: string
    
    CategoryActiveParam:
      name: active
      in: query
      description: Solo categorías activas
      required: false
      schema:
        type: string
        enum: ["true"]
    
    CategoryRootOnlyParam:
      name: root_only
      in: query
      description: Solo categorías raíz
      required: false
      schema:
        type: string
        enum: ["true"]

  schemas:
    # Respuesta genérica de listado
    ListResponse:
      type: object
      properties:
        items:
          type: array
          items: {}
        total_count:
          type: integer
          description: Total de elementos
        page:
          type: integer
          description: Página actual
        page_size:
          type: integer
          description: Tamaño de página
        total_pages:
          type: integer
          description: Total de páginas

    # Respuesta específica para categorías
    CategoryListResponse:
      allOf:
        - $ref: '#/components/schemas/ListResponse'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/Category'

    Category:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
        name:
          type: string
        description:
          type: string
        parent_id:
          type: string
          format: uuid
          nullable: true
        status:
          type: string
          enum: ["ACTIVE", "INACTIVE"]
        active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        children:
          type: array
          items:
            $ref: '#/components/schemas/Category'

    CreateCategoryRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
          maxLength: 1000
        parent_id:
          type: string
          format: uuid
          nullable: true

    UpdateCategoryRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
          maxLength: 1000
        parent_id:
          type: string
          format: uuid
          nullable: true

    MoveCategoryRequest:
      type: object
      properties:
        parent_id:
          type: string
          format: uuid
          nullable: true

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        database:
          type: string
          example: ok
        version:
          type: string
          example: 1.0.0
        timestamp:
          type: string
          format: date-time

paths:
  /health:
    get:
      summary: Verificar el estado del sistema
      tags: [Health]
      description: Devuelve información sobre el estado de salud del sistema
      responses:
        '200':
          description: Estado del sistema
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'

  /categories:
    get:
      summary: Listar categorías con filtros y paginación
      tags: [Categories]
      description: Obtiene una lista paginada de categorías con opciones de filtrado
      security:
        - BearerAuth: []
        - tenantId: []
      parameters:
        - $ref: '#/components/parameters/PageParam'
        - $ref: '#/components/parameters/PageSizeParam'
        - $ref: '#/components/parameters/SortByParam'
        - $ref: '#/components/parameters/SortDirParam'
        - $ref: '#/components/parameters/CategoryStatusParam'
        - $ref: '#/components/parameters/CategoryParentIdParam'
        - $ref: '#/components/parameters/CategoryNameParam'
        - $ref: '#/components/parameters/CategoryDescriptionParam'
        - $ref: '#/components/parameters/CategoryActiveParam'
        - $ref: '#/components/parameters/CategoryRootOnlyParam'
      responses:
        '200':
          description: Lista paginada de categorías
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CategoryListResponse'
        '400':
          description: Parámetros de filtrado inválidos
        '401':
          description: No autorizado
        '403':
          description: Sin permisos para acceder a categorías

    post:
      summary: Crear nueva categoría
      tags: [Categories]
      description: Crea una nueva categoría en el sistema
      security:
        - BearerAuth: []
        - tenantId: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCategoryRequest'
      responses:
        '201':
          description: Categoría creada exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '400':
          description: Datos de entrada inválidos
        '401':
          description: No autorizado
        '409':
          description: Categoría ya existe

  /categories/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      summary: Obtener categoría por ID
      tags: [Categories]
      description: Devuelve los detalles de una categoría específica
      security:
        - BearerAuth: []
        - tenantId: []
      responses:
        '200':
          description: Detalles de la categoría
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '404':
          description: Categoría no encontrada

    put:
      summary: Actualizar categoría
      tags: [Categories]
      description: Actualiza los datos de una categoría existente
      security:
        - BearerAuth: []
        - tenantId: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateCategoryRequest'
      responses:
        '200':
          description: Categoría actualizada exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '400':
          description: Datos de entrada inválidos
        '404':
          description: Categoría no encontrada

    delete:
      summary: Eliminar categoría
      tags: [Categories]
      description: Elimina una categoría del sistema
      security:
        - BearerAuth: []
        - tenantId: []
      responses:
        '204':
          description: Categoría eliminada
        '404':
          description: Categoría no encontrada
        '409':
          description: No se puede eliminar (tiene subcategorías)

  /categories/{id}/activate:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    patch:
      summary: Activar categoría
      tags: [Categories]
      description: Activa una categoría previamente desactivada
      security:
        - BearerAuth: []
        - tenantId: []
      responses:
        '200':
          description: Categoría activada exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '404':
          description: Categoría no encontrada

  /categories/{id}/deactivate:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    patch:
      summary: Desactivar categoría
      tags: [Categories]
      description: Desactiva una categoría activa
      security:
        - BearerAuth: []
        - tenantId: []
      responses:
        '200':
          description: Categoría desactivada exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '404':
          description: Categoría no encontrada

  /categories/{id}/move:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    patch:
      summary: Mover categoría
      tags: [Categories]
      description: Mueve una categoría a un nuevo padre
      security:
        - BearerAuth: []
        - tenantId: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MoveCategoryRequest'
      responses:
        '200':
          description: Categoría movida exitosamente
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Category'
        '400':
          description: Datos de entrada inválidos
        '404':
          description: Categoría no encontrada

  /categories/tree:
    get:
      summary: Obtener árbol de categorías
      tags: [Categories]
      description: Obtiene todas las categorías en formato de árbol
      security:
        - BearerAuth: []
        - tenantId: []
      parameters:
        - name: category_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: ID opcional de la categoría para obtener solo esa categoría y sus hijos
        - name: include_inactive
          in: query
          required: false
          schema:
            type: boolean
            default: false
          description: Incluir categorías inactivas en el árbol
      responses:
        '200':
          description: Árbol de categorías
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Category'

tags:
  - name: Health
    description: Endpoints de salud del sistema
  - name: Categories
    description: Gestión de categorías de productos 