  # ==========================================
  # AI TEMPLATE ENDPOINTS
  # ==========================================
  /templates/generate:
    post:
      summary: Generar template inteligente con AI
      tags: [AI Templates]
      description: |
        Genera un template optimizado usando inteligencia artificial basándose en:
        - Tipo de negocio seleccionado
        - Tamaño objetivo del negocio
        - Preferencias y restricciones específicas
        - Catálogo global de productos
      security:
        - BearerAuth: []
        - tenantId: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - business_type_id
                - name
                - target_size
              properties:
                business_type_id:
                  type: string
                  format: uuid
                  description: ID del tipo de negocio
                  example: "4f4e9b9e-7b8a-4c6a-9c5a-3e5f7a8b9c1d"
                name:
                  type: string
                  description: Nombre del template
                  example: "Mi Almacén Premium"
                target_size:
                  type: string
                  enum: [small, medium, large]
                  description: Tamaño objetivo del negocio
                  example: "medium"
                preferences:
                  type: object
                  properties:
                    price_range:
                      type: string
                      enum: [economy, standard, premium]
                      default: "standard"
                    include_generics:
                      type: boolean
                      default: true
                    generic_percentage:
                      type: integer
                      minimum: 0
                      maximum: 100
                      default: 25
                    categories_focus:
                      type: array
                      items:
                        type: string
                      example: ["bebidas", "snacks", "limpieza"]
                    exclude_brands:
                      type: array
                      items:
                        type: string
                      example: ["marca_x"]
                    regional_preferences:
                      type: string
                      example: "buenos_aires"
      responses:
        '200':
          description: Template generado exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  template_id:
                    type: string
                    format: uuid
                  name:
                    type: string
                  version:
                    type: integer
                  generated_by:
                    type: string
                    enum: [ai, manual, hybrid]
                  business_type:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      name:
                        type: string
                  products:
                    type: array
                    items:
                      type: object
                      properties:
                        global_product_id:
                          type: string
                          format: uuid
                        name:
                          type: string
                        category:
                          type: string
                        brand:
                          type: string
                        priority:
                          type: integer
                          description: "1=esencial, 2=recomendado, 3=opcional"
                        quantity_suggestion:
                          type: integer
                        price:
                          type: number
                  summary:
                    type: object
                    properties:
                      total_products:
                        type: integer
                      categories:
                        type: integer
                      brands:
                        type: integer
                      estimated_investment:
                        type: number
                      brand_distribution:
                        type: object
                        additionalProperties:
                          type: integer
        '400':
          description: Parámetros inválidos
        '401':
          description: No autorizado
        '500':
          description: Error del servidor

  /templates/{id}/apply:
    post:
      summary: Aplicar template al catálogo del tenant
      tags: [AI Templates]
      description: |
        Aplica un template generado al catálogo del tenant con opciones de customización:
        - Ajuste de precios y cantidades
