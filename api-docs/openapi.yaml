      description: |
        Aplica un template predefinido al catálogo del tenant.
        Crea automáticamente categorías, marcas y estructura base.
        
        **Implementado en HITO 2** para el flujo de Quickstart
      security:
        - BearerAuth: []
        - tenantId: []
      parameters:
        - name: id
          in: path
