                          average_growth_rate:
                            type: number
                  common_modifications:
                    type: array
                    items:
                      type: object
                      properties:
                        action:
                          type: string
                          enum: [remove_product, add_category, change_quantity]
                        product:
                          type: string
                        category:
                          type: string
                        frequency:
                          type: number
                  regional_performance:
                    type: object
                    additionalProperties:
                      type: object
                      properties:
                        usage:
                          type: integer
                        satisfaction:
                          type: number
        '404':
