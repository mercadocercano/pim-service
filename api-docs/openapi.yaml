      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                customizations:
                  type: object
                  properties:
                    exclude_products:
                      type: array
                      items:
                        type: string
                        format: uuid
                    price_multiplier:
                      type: number
                      minimum: 0.1
                      maximum: 10
                      default: 1.0
                    quantity_adjustments:
                      type: object
                      additionalProperties:
                        type: integer
                apply_options:
                  type: object
                  properties:
                    create_categories:
                      type: boolean
                      default: true
                    create_brands:
                      type: boolean
                      default: true
                    create_products:
                      type: boolean
                      default: true
                    initial_stock:
                      type: boolean
                      default: true
      responses:
        '200':
          description: Template aplicado exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  application_id:
                    type: string
                    format: uuid
                  results:
                    type: object
                    properties:
                      categories_created:
                        type: integer
                      brands_created:
                        type: integer
                      products_created:
                        type: integer
                      products_skipped:
                        type: integer
                      initial_stock_created:
                        type: boolean
                  summary:
                    type: object
                    properties:
                      total_value:
                        type: number
                      setup_time:
                        type: string
                      customizations_applied:
                        type: array
                        items:
                          type: string
        '400':
          description: Parámetros inválidos
        '404':
          description: Template no encontrado
        '500':
          description: Error del servidor

  /templates/{id}/performance:
    get:
      summary: Obtener métricas de rendimiento del template
      tags: [AI Templates]
      description: |
        Obtiene análisis de rendimiento y métricas de uso del template:
        - Tasa de adopción y satisfacción
        - Modificaciones comunes realizadas
