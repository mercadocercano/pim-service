            format: uuid
          description: ID del producto padre
      responses:
        '200':
          description: Lista de variantes
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        product_id:
                          type: string
                          format: uuid
                        sku:
                          type: string
                          example: "TALADRO-BOSCH-750W"
                        name:
                          type: string
                          example: "Taladro Bosch 750W"
