        '404':
          description: Variante no encontrada
        '500':
          description: Error interno del servidor

  # ==========================================
  # IMPORT WITH VARIANTS ENDPOINTS (HITO 2.1)
  # ==========================================
  /products/import:
    post:
      summary: Importar productos con variantes
      tags: [Import]
      description: |
        Importa productos con sus variantes desde CSV o JSON.
        
        **Implementado en HITO 2.1**
        
        El parser detecta automáticamente:
        - Columnas estándar (name, sku, price, category, brand)
        - Atributos dinámicos (potencia, voltaje, color, etc.)
        - Agrupa filas por product_name para crear variantes
        
        Formato CSV esperado:
        ```
        product_name,variant_sku,category,brand,potencia,voltaje,price
        Taladro Bosch,TALADRO-750W,Herramientas,Bosch,750W,220V,45000
        Taladro Bosch,TALADRO-1000W,Herramientas,Bosch,1000W,220V,65000
        ```
      security:
        - BearerAuth: []
        - tenantId: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - file
              properties:
                file:
                  type: string
                  format: binary
                  description: Archivo CSV o JSON
                create_categories:
                  type: boolean
                  default: true
                  description: Crear categorías automáticamente si no existen
                create_brands:
                  type: boolean
                  default: true
                  description: Crear marcas automáticamente si no existen
          application/json:
            schema:
              type: object
              required:
                - products
              properties:
                products:
                  type: array
                  items:
                    type: object
                    properties:
                      product_name:
                        type: string
                      category_name:
                        type: string
                      brand_name:
                        type: string
                      variants:
                        type: array
                        items:
                          type: object
                          properties:
                            sku:
                              type: string
                            attributes:
                              type: object
                            price:
                              type: number
                create_categories:
                  type: boolean
                  default: true
                create_brands:
                  type: boolean
                  default: true
      responses:
        '200':
          description: Resultado de la importación
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  summary:
                    type: object
                    properties:
                      products_created:
                        type: integer
                      variants_created:
                        type: integer
                      categories_created:
                        type: integer
                      brands_created:
                        type: integer
                      products_skipped:
                        type: integer
                      errors:
                        type: array
                        items:
                          type: object
                          properties:
                            row:
                              type: integer
                            error:
                              type: string
        '400':
          description: Archivo inválido o formato incorrecto
        '401':
          description: No autorizado
        '500':
          description: Error interno del servidor

  # ==========================================
  # QUICKSTART TEMPLATES ENDPOINTS (HITO 2)
