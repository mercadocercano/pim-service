  # ==========================================
  /health:
    get:
      summary: Verificar el estado del sistema
      tags: [Health]
      description: Devuelve información sobre el estado de salud del sistema
      responses:
        '200':
          description: Estado del sistema
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "healthy"
                  timestamp:
                    type: string
                    format: date-time
                  database:
                    type: string
                    example: "connected"
        '500':
          description: Error interno del servidor

