        - tenantId: []
      parameters:
        - name: business_type
          in: query
          description: Filtrar por tipo de negocio
          schema:
            type: string
            example: "ferreteria"
      responses:
        '200':
          description: Lista de templates
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
