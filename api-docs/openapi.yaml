openapi: 3.1.0
info:
  title: Multi-Tenant PIM API
  version: 1.0.0
  description: API para gestión de información de productos multi-tenant

servers:
  - url: /pim/api/v1
    description: Base URL para la API v1
  - url: http://localhost:8080/pim/api/v1
    description: Servidor local de desarrollo

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Token JWT para autenticación
    tenantId:
      type: apiKey
      in: header
      name: X-Tenant-ID
      description: ID del tenant para operaciones multi-tenant

  parameters:
    # Parámetros básicos de paginación y filtrado
    PageParam:
      name: page
      in: query
      description: "Número de página (default: 1)"
      required: false
      schema:
        type: integer
        minimum: 1
        default: 1
    
    PageSizeParam:
      name: page_size
      in: query
      description: "Tamaño de página (default: 10, max: 100)"
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 10
    
    SortByParam:
      name: sort_by
      in: query
      description: "Campo de ordenamiento (default: created_at)"
      required: false
      schema:
        type: string
        default: "created_at"
    
    SortDirParam:
      name: sort_dir
      in: query
      description: "Dirección de ordenamiento (asc o desc, default: desc)"
      required: false
      schema:
        type: string
        enum: ["asc", "desc"]
        default: "desc"

    # Parámetros específicos para categorías
    CategoryStatusParam:
      name: status
      in: query
      description: Estado de la categoría
      required: false
      schema:
        type: string
        enum: ["ACTIVE", "INACTIVE"]
    
    CategoryParentIdParam:
      name: parent_id
      in: query
      description: ID del padre o null para categorías raíz
      required: false
      schema:
        type: string
        format: uuid
        nullable: true
    
    CategoryNameParam:
      name: name
      in: query
      description: "Búsqueda por nombre (LIKE)"
      required: false
      schema:
        type: string
    
    CategoryDescriptionParam:
      name: description
      in: query
      description: "Búsqueda por descripción (LIKE)"
      required: false
      schema:
        type: string
    
    CategoryActiveParam:
      name: active
      in: query
      description: Solo categorías activas
      required: false
      schema:
        type: string
        enum: ["true"]
    
    CategoryRootOnlyParam:
      name: root_only
      in: query
      description: Solo categorías raíz
      required: false
      schema:
        type: string
        enum: ["true"]

    # Parámetros específicos para marcas
    BrandStatusParam:
      name: status
      in: query
      description: Estado de la marca
      required: false
      schema:
        type: string
        enum: ["active", "inactive", "deleted"]
    
    BrandNameParam:
      name: name
      in: query
      description: "Búsqueda por nombre (LIKE)"
      required: false
      schema:
        type: string
    
    BrandDescriptionParam:
      name: description
      in: query
      description: "Búsqueda por descripción (LIKE)"
      required: false
      schema:
        type: string
    
    BrandActiveParam:
      name: active
      in: query
      description: Solo marcas activas
      required: false
      schema:
        type: string
        enum: ["true"]

    # Parámetros específicos para productos
    ProductStatusParam:
      name: status
      in: query
      description: Estado del producto
      required: false
      schema:
        type: string
        enum: ["active", "inactive", "discontinued", "deleted"]
    
    ProductNameParam:
      name: name
      in: query
      description: "Búsqueda por nombre (LIKE)"
      required: false
      schema:
        type: string
    
    ProductDescriptionParam:
      name: description
      in: query
      description: "Búsqueda por descripción (LIKE)"
      required: false
      schema:
        type: string
    
    ProductSKUParam:
      name: sku
      in: query
      description: "Búsqueda por SKU (LIKE)"
      required: false
      schema:
        type: string
    
    ProductCategoryIdParam:
      name: category_id
      in: query
      description: ID de la categoría
      required: false
      schema:
        type: string
        format: uuid
    
    ProductBrandIdParam:
      name: brand_id
      in: query
      description: ID de la marca
      required: false
      schema:
        type: string
        format: uuid
    
    ProductCategoryNameParam:
      name: category_name
      in: query
      description: "Búsqueda por nombre de categoría (LIKE)"
      required: false
      schema:
        type: string
    
    ProductBrandNameParam:
      name: brand_name
      in: query
      description: "Búsqueda por nombre de marca (LIKE)"
      required: false
      schema:
        type: string
    
    ProductIncludeDeletedParam:
      name: include_deleted
      in: query
      description: Incluir productos eliminados
      required: false
      schema:
        type: boolean
        default: false

  schemas:
    # Respuesta genérica de listado
    ListResponse:
      type: object
      properties:
        items:
          type: array
          items: {}
        total_count:
          type: integer
          description: Total de elementos
        page:
          type: integer
          description: Página actual
        page_size:
          type: integer
          description: Tamaño de página
        total_pages:
          type: integer
          description: Total de páginas

    # Respuesta específica para categorías
    CategoryListResponse:
      allOf:
        - $ref: '#/components/schemas/ListResponse'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/Category'

    # Respuesta específica para marcas
    BrandListResponse:
      allOf:
        - $ref: '#/components/schemas/ListResponse'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/Brand'

    Category:
      type: object
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
        name:
          type: string
        description:
          type: string
        parent_id:
          type: string
          format: uuid
          nullable: true
        status:
          type: string
          enum: ["ACTIVE", "INACTIVE"]
        active:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        children:
          type: array
          items:
            $ref: '#/components/schemas/Category'

    Brand:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: ID único de la marca
        tenant_id:
          type: string
          description: ID del tenant propietario
        name:
          type: string
          description: Nombre de la marca
        description:
          type: string
          description: Descripción de la marca
        logo_url:
          type: string
          format: uri
          nullable: true
          description: URL del logo de la marca
        website:
          type: string
          format: uri
          nullable: true
          description: Sitio web oficial de la marca
        status:
          type: string
          enum: ["active", "inactive", "deleted"]
          description: Estado de la marca
        created_at:
          type: string
          format: date-time
          description: Fecha de creación
        updated_at:
          type: string
          format: date-time
          description: Fecha de última actualización

    Product:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: ID único del producto
        tenant_id:
          type: string
          description: ID del tenant propietario
        name:
          type: string
          description: Nombre del producto
        description:
          type: string
          nullable: true
          description: Descripción del producto
        sku:
          type: string
          nullable: true
          description: Código SKU del producto
        status:
          type: string
          enum: ["active", "inactive", "discontinued", "deleted"]
          description: Estado del producto
        category:
          $ref: '#/components/schemas/CategoryReference'
        brand:
          $ref: '#/components/schemas/BrandReference'
        created_at:
          type: string
          format: date-time
          description: Fecha de creación
        updated_at:
          type: string
          format: date-time
          description: Fecha de última actualización

    CategoryReference:
      type: object
      nullable: true
      properties:
        id:
          type: string
          format: uuid
          description: ID de la categoría
        name:
          type: string
          description: Nombre de la categoría

    BrandReference:
      type: object
      nullable: true
      properties:
        id:
          type: string
          format: uuid
          description: ID de la marca
        name:
          type: string
          description: Nombre de la marca

    ProductListResponse:
      allOf:
        - $ref: '#/components/schemas/ListResponse'
        - type: object
          properties:
            items:
              type: array
              items:
                $ref: '#/components/schemas/Product'

    CreateCategoryRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
          maxLength: 1000
        parent_id:
          type: string
          format: uuid
          nullable: true

    UpdateCategoryRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
        description:
          type: string
          maxLength: 1000
        parent_id:
          type: string
          format: uuid
          nullable: true

    MoveCategoryRequest:
      type: object
      properties:
        parent_id:
          type: string
          format: uuid
          nullable: true

    CreateBrandRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
          description: Nombre de la marca
        description:
          type: string
          maxLength: 1000
          description: Descripción de la marca
        logo_url:
          type: string
          format: uri
          nullable: true
          description: URL del logo de la marca
        website:
          type: string
          format: uri
          nullable: true
          description: Sitio web oficial de la marca

    UpdateBrandRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
          description: Nombre de la marca
        description:
          type: string
          maxLength: 1000
          description: Descripción de la marca
        logo_url:
          type: string
          format: uri
          nullable: true
          description: URL del logo de la marca
        website:
          type: string
          format: uri
          nullable: true
          description: Sitio web oficial de la marca

    CreateProductRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 255
          description: Nombre del producto
        description:
          type: string
          maxLength: 1000
          nullable: true
          description: Descripción del producto
        sku:
          type: string
          minLength: 3
          maxLength: 50
          nullable: true
          description: Código SKU del producto
        category_id:
          type: string
          format: uuid
          nullable: true
          description: ID de la categoría
        brand_id:
          type: string
          format: uuid
          nullable: true
          description: ID de la marca

    UpdateProductRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 255
          description: Nombre del producto
        description:
          type: string
          maxLength: 1000
          nullable: true
          description: Descripción del producto
        sku:
          type: string
          minLength: 3
          maxLength: 50
          nullable: true
          description: Código SKU del producto
        category_id:
          type: string
          format: uuid
          nullable: true
          description: ID de la categoría
        brand_id:
          type: string
          format: uuid
          nullable: true
          description: ID de la marca

    ProductVariant:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: ID único de la variante
        tenant_id:
          type: string
          format: uuid
          description: ID del tenant
        product_id:
          type: string
          format: uuid
          description: ID del producto padre
        name:
          type: string
          description: Nombre de la variante
        sku:
          type: string
          nullable: true
          description: Código SKU de la variante
        status:
          type: string
          enum: [active, inactive, discontinued, deleted]
          description: Estado de la variante
        is_default:
          type: boolean
          description: Indica si es la variante por defecto
        sort_order:
          type: integer
          description: Orden de clasificación
        attributes:
          type: array
          items:
            $ref: '#/components/schemas/VariantAttribute'
          description: Atributos de la variante
        created_at:
          type: string
          format: date-time
          description: Fecha de creación
        updated_at:
          type: string
          format: date-time
          description: Fecha de última actualización

    VariantAttribute:
      type: object
      properties:
        name:
          type: string
          description: Nombre del atributo
        value:
          type: string
          description: Valor del atributo

    CreateProductVariantRequest:
      type: object
      required:
        - product_id
        - name
      properties:
        product_id:
          type: string
          format: uuid
          description: ID del producto padre
        name:
          type: string
          minLength: 2
          maxLength: 255
          description: Nombre de la variante
        sku:
          type: string
          minLength: 3
          maxLength: 50
          nullable: true
          description: Código SKU de la variante
        is_default:
          type: boolean
          nullable: true
          description: Indica si es la variante por defecto
        sort_order:
          type: integer
          minimum: 0
          nullable: true
          description: Orden de clasificación
        attributes:
          type: array
          items:
            $ref: '#/components/schemas/CreateVariantAttributeRequest'
          description: Atributos de la variante

    CreateVariantAttributeRequest:
      type: object
      required:
        - name
        - value
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
          description: Nombre del atributo
        value:
          type: string
          minLength: 1
          maxLength: 255
          description: Valor del atributo

    UpdateProductVariantRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 255
          description: Nombre de la variante
        sku:
          type: string
          minLength: 3
          maxLength: 50
          nullable: true
          description: Código SKU de la variante
        is_default:
          type: boolean
          nullable: true
          description: Indica si es la variante por defecto
        sort_order:
          type: integer
          minimum: 0
          nullable: true
          description: Orden de clasificación
        attributes:
          type: array
          items:
            $ref: '#/components/schemas/UpdateVariantAttributeRequest'
          description: Atributos de la variante

    UpdateVariantAttributeRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 2
          maxLength: 100
          description: Nombre del atributo
        value:
          type: string
          minLength: 1
          maxLength: 255
          description: Valor del atributo

    ProductVariantListResponse:
      allOf:
        - $ref: '#/components/schemas/ListResponse'
        - type: object
          properties:
            variants:
              type: array
              items:
                $ref: '#/components/schemas/ProductVariant'

    HealthResponse:
      type: object
      properties:
        status:
          type: string
          example: ok
        database:
          type: string
          example: ok
        version:
          type: string
          example: 1.0.0
        timestamp:
          type: string
          format: date-time

    # 🚀 QUICKSTART SCHEMAS
    BusinessType:
      type: object
      properties:
        id:
          type: string
          description: ID único del tipo de negocio
          example: "retail"
        name:
          type: string
          description: Nombre del tipo de negocio
          example: "Comercio Minorista"
        description:
          type: string
          description: Descripción del tipo de negocio
          example: "Tiendas de venta al por menor, supermercados, minimarkets"
        icon:
          type: string
          description: Icono representativo del tipo de negocio
          example: "store"

    QuickstartCategory:
      type: object
      properties:
        id:
          type: string
          description: ID único de la categoría
          example: "home-garden"
        name:
          type: string
          description: Nombre de la categoría
          example: "Hogar y Jardín"
        description:
          type: string
          description: Descripción de la categoría
          example: "Productos para el hogar y jardinería"
        parent_id:
          type: string
          nullable: true
          description: ID de la categoría padre
          example: null
        subcategories:
          type: array
          items:
            $ref: '#/components/schemas/QuickstartCategory'
          description: Subcategorías anidadas

    QuickstartAttribute:
      type: object
      properties:
        id:
          type: string
          description: ID único del atributo
          example: "color"
        name:
          type: string
          description: Nombre del atributo
          example: "Color"
        type:
          type: string
          enum: ["select", "number", "text", "boolean"]
          description: Tipo de dato del atributo
          example: "select"
        required:
          type: boolean
          description: Si el atributo es obligatorio
          example: false
        description:
          type: string
          description: Descripción del atributo
          example: "Color del producto"
        values:
          type: array
          items:
            type: string
          description: Valores posibles para atributos tipo select
          example: ["Negro", "Blanco", "Gris", "Azul", "Rojo"]
        unit:
          type: string
          nullable: true
          description: Unidad de medida para atributos numéricos
          example: "cm"
        min_value:
          type: number
          nullable: true
          description: Valor mínimo para atributos numéricos
          example: 0
        max_value:
          type: number
          nullable: true
          description: Valor máximo para atributos numéricos
          example: 1000
        placeholder:
          type: string
          nullable: true
          description: Texto de ayuda para atributos de texto
          example: "Ingrese descripción..."

    QuickstartVariant:
      type: object
      properties:
        id:
          type: string
          description: ID único de la configuración de variante
          example: "color-size"
        name:
          type: string
          description: Nombre de la configuración de variante
          example: "Color y Talla"
        description:
          type: string
          description: Descripción de la configuración de variante
          example: "Variante por color y talla del producto"
        attributes:
          type: array
          items:
            type: string
          description: Lista de atributos que componen la variante
          example: ["color", "size"]
        combinations:
          type: array
          items:
            type: object
            additionalProperties: true
          description: Combinaciones específicas de valores de atributos
          example:
            - color: "Negro"
              size: "M"
              sku_suffix: "BLK-M"

    QuickstartProduct:
      type: object
      properties:
        id:
          type: string
          description: ID único del producto
          example: "sofa-3-plazas"
        name:
          type: string
          description: Nombre del producto
          example: "Sofá de 3 Plazas"
        description:
          type: string
          description: Descripción del producto
          example: "Sofá cómodo de 3 plazas ideal para sala de estar"
        category:
          type: string
          description: ID de la categoría del producto
          example: "living-room-furniture"
        base_price:
          type: integer
          description: Precio base del producto en centavos
          example: 89999
        currency:
          type: string
          description: Moneda del precio
          example: "ARS"
        sku:
          type: string
          description: Código SKU del producto
          example: "SOFA-001"
        attributes:
          type: object
          additionalProperties: true
          description: Atributos específicos del producto
          example:
            color: "Gris"
            material: "Tela"
            weight: 45000
        variants:
          type: array
          items:
            type: string
          description: Configuraciones de variantes aplicables
          example: ["color-material"]
        stock:
          type: integer
          description: Stock inicial del producto
          example: 10

    QuickstartBrand:
      type: object
      properties:
        id:
          type: string
          description: ID único de la marca
          example: "ikea"
        name:
          type: string
          description: Nombre de la marca
          example: "IKEA"
        description:
          type: string
          description: Descripción de la marca
          example: "Muebles y artículos para el hogar"
        country_origin:
          type: string
          description: País de origen de la marca
          example: "Suecia"
        category:
          type: string
          description: Categoría principal de la marca
          example: "Muebles y Decoración"
        website:
          type: string
          format: uri
          nullable: true
          description: Sitio web oficial de la marca
          example: "https://www.ikea.com"
        logo_url:
          type: string
          nullable: true
          description: URL del logo de la marca
          example: "/brands/ikea-logo.png"

    SetupTenantRequest:
      type: object
      required:
        - business_type
      properties:
        business_type:
          type: string
          enum: [retail, food-beverage, fashion, electronics, automotive, sports-fitness, health-pharmacy, books-media, home-construction, beauty-cosmetics, toys-games, pet-supplies, office-supplies, jewelry-accessories]
          description: Tipo de negocio para la configuración quickstart
          example: "retail"
        include_categories:
          type: boolean
          default: true
          description: Incluir categorías predefinidas
          example: true
        include_attributes:
          type: boolean
          default: true
          description: Incluir atributos predefinidos
          example: true
        include_variants:
          type: boolean
          default: true
          description: Incluir configuraciones de variantes predefinidas
          example: true
        include_products:
          type: boolean
          default: false
          description: Incluir productos de ejemplo
          example: false
        include_brands:
          type: boolean
          default: true
          description: Incluir marcas predefinidas
          example: true

    SetupResponse:
      type: object
      properties:
        success:
          type: boolean
          description: Indica si la configuración fue exitosa
          example: true
        business_type:
          type: string
          description: Tipo de negocio configurado
          example: "retail"
        tenant_id:
          type: string
          format: uuid
          description: ID del tenant configurado
          example: "123e4567-e89b-12d3-a456-426614174000"
        configured_components:
          type: object
          properties:
            categories:
              type: integer
              description: Número de categorías creadas
              example: 5
            attributes:
              type: integer
              description: Número de atributos creados
              example: 20
            variants:
              type: integer
              description: Número de configuraciones de variantes creadas
              example: 10
            products:
              type: integer
              description: Número de productos creados
              example: 0
            brands:
              type: integer
              description: Número de marcas creadas
              example: 37
        timestamp:
          type: string
          format: date-time
          description: Fecha y hora de la configuración
          example: "2024-05-25T22:30:00Z"

    # ========================================
    # MARKETPLACE SCHEMAS
    # ========================================

    MarketplaceCategoryNode:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: ID de la categoría marketplace
        name:
          type: string
          description: Nombre de la categoría
        description:
          type: string
          description: Descripción de la categoría
        parent_id:
          type: string
          format: uuid
          nullable: true
          description: ID de la categoría padre
        tenant_mapping:
          type: object
          nullable: true
          properties:
            custom_name:
              type: string
              description: Nombre personalizado por el tenant
            is_mapped:
              type: boolean
              description: Si el tenant ha mapeado esta categoría
        children:
          type: array
          items:
            $ref: '#/components/schemas/MarketplaceCategoryNode'
          description: Categorías hijas

    MarketplaceCategory:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: ID único de la categoría marketplace
        name:
          type: string
          description: Nombre de la categoría
        description:
          type: string
          description: Descripción de la categoría
        parent_id:
          type: string
          format: uuid
          nullable: true
          description: ID de la categoría padre
        attributes:
          type: array
          items:
            $ref: '#/components/schemas/MarketplaceAttribute'
          description: Atributos asociados a la categoría
        created_at:
          type: string
          format: date-time
          description: Fecha de creación
        updated_at:
          type: string
          format: date-time
          description: Fecha de última actualización

    MarketplaceAttribute:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: ID único del atributo
        name:
          type: string
          description: Nombre del atributo
        type:
          type: string
          enum: [text, number, boolean, select, multiselect]
          description: Tipo de atributo
        required:
          type: boolean
          description: Si el atributo es obligatorio
        options:
          type: array
          items:
            type: string
          description: Opciones para atributos select/multiselect
          nullable: true

    TenantCategoryMapping:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: ID único del mapeo
        tenant_id:
          type: string
          format: uuid
          description: ID del tenant
        marketplace_category_id:
          type: string
          format: uuid
          description: ID de la categoría marketplace
        custom_name:
          type: string
          description: Nombre personalizado por el tenant
        custom_description:
          type: string
          nullable: true
          description: Descripción personalizada por el tenant
        is_active:
          type: boolean
          description: Si el mapeo está activo
        created_at:
          type: string
          format: date-time
          description: Fecha de creación
        updated_at:
          type: string
          format: date-time
          description: Fecha de última actualización

    TenantCustomAttribute:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: ID único del atributo personalizado
        tenant_id:
          type: string
          format: uuid
          description: ID del tenant
        name:
          type: string
          description: Nombre del atributo personalizado
        type:
          type: string
          enum: [text, number, boolean, select, multiselect]
          description: Tipo de atributo
        required:
          type: boolean
          description: Si el atributo es obligatorio
        options:
          type: array
          items:
            type: string
          description: Opciones para atributos select/multiselect
          nullable: true
        created_at:
          type: string
          format: date-time
          description: Fecha de creación
        updated_at:
          type: string
          format: date-time
          description: Fecha de última actualización

    CreateMarketplaceCategoryRequest:
      type: object
      required: [name, description]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
          description: Nombre de la categoría marketplace
        description:
          type: string
          minLength: 1
          maxLength: 1000
          description: Descripción de la categoría marketplace
        parent_id:
          type: string
          format: uuid
          nullable: true
          description: ID de la categoría padre (null para categorías raíz)
        attributes:
          type: array
          items:
            type: object
            required: [name, type]
            properties:
              name:
                type: string
                description: Nombre del atributo
              type:
                type: string
                enum: [text, number, boolean, select, multiselect]
                description: Tipo de atributo
              required:
                type: boolean
                default: false
                description: Si el atributo es obligatorio
              options:
                type: array
                items:
                  type: string
                description: Opciones para select/multiselect
          description: Atributos asociados a la categoría

    MapTenantCategoryRequest:
      type: object
      required: [marketplace_category_id, custom_name]
      properties:
        marketplace_category_id:
          type: string
          format: uuid
          description: ID de la categoría marketplace global
        custom_name:
          type: string
          minLength: 1
          maxLength: 255
          description: Nombre personalizado para el tenant
        custom_description:
          type: string
          maxLength: 1000
          nullable: true
          description: Descripción personalizada para el tenant
        is_active:
          type: boolean
          default: true
          description: Si el mapeo está activo

    UpdateTenantCategoryMappingRequest:
      type: object
      properties:
        custom_name:
          type: string
          minLength: 1
          maxLength: 255
          description: Nombre personalizado actualizado
        custom_description:
          type: string
          maxLength: 1000
          nullable: true
          description: Descripción personalizada actualizada
        is_active:
          type: boolean
          description: Estado del mapeo

    CreateTenantCustomAttributeRequest:
      type: object
      required: [name, type]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
          description: Nombre del atributo personalizado
        type:
          type: string
          enum: [text, number, boolean, select, multiselect]
          description: Tipo de atributo
        required:
          type: boolean
          default: false
          description: Si el atributo es obligatorio
        options:
          type: array
          items:
            type: string
          description: Opciones para atributos select/multiselect

    UpdateTenantCustomAttributeRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 255
          description: Nombre actualizado del atributo
        type:
          type: string
          enum: [text, number, boolean, select, multiselect]
          description: Tipo actualizado del atributo
        required:
          type: boolean
          description: Si el atributo es obligatorio
        options:
          type: array
          items:
            type: string
          description: Opciones actualizadas para select/multiselect

