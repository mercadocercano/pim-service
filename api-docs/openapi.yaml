  # AI TEMPLATE ENDPOINTS
  # ==========================================
  /templates/generate:
    post:
      summary: Generar template inteligente con AI
      tags: [AI Templates]
      description: |
        Genera un template optimizado usando inteligencia artificial basándose en:
        - Tipo de negocio seleccionado
        - Tamaño objetivo del negocio
        - Preferencias y restricciones específicas
        - Catálogo global de productos
      security:
        - BearerAuth: []
        - tenantId: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - business_type_id
                - name
                - target_size
              properties:
                business_type_id:
                  type: string
                  format: uuid
                  description: ID del tipo de negocio
                  example: "4f4e9b9e-7b8a-4c6a-9c5a-3e5f7a8b9c1d"
                name:
                  type: string
                  description: Nombre del template
                  example: "Mi Almacén Premium"
                target_size:
                  type: string
                  enum: [small, medium, large]
                  description: Tamaño objetivo del negocio
                  example: "medium"
                preferences:
                  type: object
                  properties:
                    price_range:
                      type: string
                      enum: [economy, standard, premium]
                      default: "standard"
                    include_generics:
                      type: boolean
                      default: true
                    generic_percentage:
                      type: integer
                      minimum: 0
                      maximum: 100
                      default: 25
                    categories_focus:
                      type: array
                      items:
                        type: string
                      example: ["bebidas", "snacks", "limpieza"]
                    exclude_brands:
                      type: array
                      items:
                        type: string
                      example: ["marca_x"]
                    regional_preferences:
                      type: string
                      example: "buenos_aires"
      responses:
        '200':
          description: Template generado exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  template_id:
                    type: string
                    format: uuid
                  name:
                    type: string
                  version:
                    type: integer
                  generated_by:
                    type: string
                    enum: [ai, manual, hybrid]
                  business_type:
                    type: object
                    properties:
                      id:
                        type: string
                        format: uuid
                      name:
                        type: string
                  products:
                    type: array
                    items:
                      type: object
                      properties:
                        global_product_id:
                          type: string
                          format: uuid
                        name:
                          type: string
                        category:
                          type: string
                        brand:
                          type: string
                        priority:
                          type: integer
                          description: "1=esencial, 2=recomendado, 3=opcional"
                        quantity_suggestion:
                          type: integer
                        price:
                          type: number
                  summary:
                    type: object
                    properties:
                      total_products:
                        type: integer
                      categories:
                        type: integer
                      brands:
                        type: integer
                      estimated_investment:
                        type: number
                      brand_distribution:
                        type: object
                        additionalProperties:
                          type: integer
        '400':
          description: Parámetros inválidos
        '401':
          description: No autorizado
        '500':
          description: Error del servidor

  /templates/{id}/apply:
    post:
      summary: Aplicar template al catálogo del tenant
      tags: [AI Templates]
      description: |
        Aplica un template generado al catálogo del tenant con opciones de customización:
        - Ajuste de precios y cantidades
        - Exclusión de productos específicos
        - Creación de categorías y marcas necesarias
      security:
        - BearerAuth: []
        - tenantId: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID del template a aplicar
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                customizations:
                  type: object
                  properties:
                    exclude_products:
                      type: array
                      items:
                        type: string
                        format: uuid
                    price_multiplier:
                      type: number
                      minimum: 0.1
                      maximum: 10
                      default: 1.0
                    quantity_adjustments:
                      type: object
                      additionalProperties:
                        type: integer
                apply_options:
                  type: object
                  properties:
                    create_categories:
                      type: boolean
                      default: true
                    create_brands:
                      type: boolean
                      default: true
                    create_products:
                      type: boolean
                      default: true
                    initial_stock:
                      type: boolean
                      default: true
      responses:
        '200':
          description: Template aplicado exitosamente
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  application_id:
                    type: string
                    format: uuid
                  results:
                    type: object
                    properties:
                      categories_created:
                        type: integer
                      brands_created:
                        type: integer
                      products_created:
                        type: integer
                      products_skipped:
                        type: integer
                      initial_stock_created:
                        type: boolean
                  summary:
                    type: object
                    properties:
                      total_value:
                        type: number
                      setup_time:
                        type: string
                      customizations_applied:
                        type: array
                        items:
                          type: string
        '400':
          description: Parámetros inválidos
        '404':
          description: Template no encontrado
        '500':
          description: Error del servidor

  /templates/{id}/performance:
    get:
      summary: Obtener métricas de rendimiento del template
      tags: [AI Templates]
      description: |
        Obtiene análisis de rendimiento y métricas de uso del template:
        - Tasa de adopción y satisfacción
        - Modificaciones comunes realizadas
        - Rendimiento por región
        - Recomendaciones de mejora
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID del template
      responses:
        '200':
          description: Métricas de rendimiento
          content:
            application/json:
              schema:
                type: object
                properties:
                  template_id:
                    type: string
                    format: uuid
                  performance_metrics:
                    type: object
                    properties:
                      usage_count:
                        type: integer
                      average_satisfaction:
                        type: number
                        minimum: 0
                        maximum: 5
                      modification_rate:
                        type: number
                        minimum: 0
                        maximum: 1
                      average_products_kept:
                        type: number
                        minimum: 0
                        maximum: 1
                      revenue_impact:
                        type: object
                        properties:
                          average_first_month:
                            type: number
                          average_growth_rate:
                            type: number
                  common_modifications:
                    type: array
                    items:
                      type: object
                      properties:
                        action:
                          type: string
                          enum: [remove_product, add_category, change_quantity]
                        product:
                          type: string
                        category:
                          type: string
                        frequency:
                          type: number
                  regional_performance:
                    type: object
                    additionalProperties:
                      type: object
                      properties:
                        usage:
                          type: integer
                        satisfaction:
                          type: number
        '404':
          description: Template no encontrado
        '500':
          description: Error interno del servidor

  # ==========================================
  # VARIANTS ENDPOINTS (HITO 2.1)
  # ==========================================
  /products/{id}/variants:
    get:
      summary: Listar variantes de un producto
      tags: [Variants]
      description: |
        Obtiene todas las variantes de un producto.
        Las variantes tienen SKU único y atributos dinámicos.
        
        **Implementado en HITO 2.1**
      security:
        - BearerAuth: []
        - tenantId: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: ID del producto padre
      responses:
        '200':
          description: Lista de variantes
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        product_id:
                          type: string
                          format: uuid
                        sku:
                          type: string
                          example: "TALADRO-BOSCH-750W"
                        name:
                          type: string
                          example: "Taladro Bosch 750W"
                        attributes:
                          type: object
                          additionalProperties: true
                          example:
                            potencia: "750W"
                            voltaje: "220V"
                        price:
                          type: number
                          example: 45000
                        status:
                          type: string
                          enum: ["active", "inactive", "discontinued"]
                        created_at:
                          type: string
                          format: date-time
                  total_count:
                    type: integer
        '404':
          description: Producto no encontrado
        '500':
          description: Error interno del servidor

    post:
      summary: Crear variante de producto
      tags: [Variants]
      description: Crea una nueva variante para un producto
      security:
        - BearerAuth: []
        - tenantId: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - sku
                - name
              properties:
                sku:
                  type: string
                  example: "TALADRO-BOSCH-1000W"
                name:
                  type: string
                  example: "Taladro Bosch 1000W"
                attributes:
                  type: object
                  additionalProperties: true
                  example:
                    potencia: "1000W"
                    voltaje: "220V"
                price:
                  type: number
                  example: 65000
      responses:
        '201':
          description: Variante creada
        '400':
          description: Datos inválidos
        '404':
          description: Producto no encontrado
        '409':
          description: SKU ya existe
        '500':
          description: Error interno del servidor

  /variants/by-skus:
    post:
      summary: Búsqueda por lotes de variantes por SKU
      tags: [Variants]
      operationId: getVariantsBySKUs
      description: |
        Realiza una búsqueda por lotes de variantes de productos enriquecidas
        con información del producto y categoría.
      security:
        - BearerAuth: []
        - tenantId: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [skus]
              properties:
                skus:
                  type: array
                  items:
                    type: string
                  description: Lista de SKUs a buscar
                  example: ["SKU-1", "SKU-2", "SKU-3"]
      responses:
        '200':
          description: Lista de variantes enriquecidas encontradas
          content:
            application/json:
              schema:
                type: object
                required: [variants]
                properties:
                  variants:
                    type: array
                    items:
                      type: object
                      properties:
                        variant_id:
                          type: string
                          format: uuid
                          description: ID de la variante
                        product_id:
                          type: string
                          format: uuid
                          description: ID del producto
                        sku:
                          type: string
                          description: Código SKU
                        variant_name:
                          type: string
                          description: Nombre de la variante
                        product_name:
                          type: string
                          description: Nombre del producto
                        category_id:
                          type: string
                          description: ID de la categoría
                        category_name:
                          type: string
                          description: Nombre de la categoría
                        price:
                          type: number
                          format: float
                          description: Precio
        '400':
          description: Datos de entrada inválidos
        '401':
          description: No autorizado
        '500':
          description: Error interno del servidor

  /variants/{variant_id}:
    parameters:
      - name: variant_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    
    get:
      summary: Obtener variante por ID
      tags: [Variants]
      security:
        - BearerAuth: []
        - tenantId: []
      responses:
        '200':
