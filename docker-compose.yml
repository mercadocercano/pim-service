version: '3.8'

services:
  postgres-setup:
    image: pgvector/pgvector:pg15
    container_name: mc-pim-postgres-setup
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-postgres}
    command: >
      sh -c "
        psql -h lab-postgres -U ${POSTGRES_USER:-postgres} -c 'CREATE DATABASE pim_db;' || true &&
        echo 'Databases ready.'
      "
    networks:
      - lab-network

  pim-service:
    build:
      context: .
      dockerfile: Dockerfile
      target: development
    container_name: mc-pim-service
    environment:
      DB_HOST: lab-postgres
      DB_PORT: 5432
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      DB_NAME: pim_db
      DB_SSLMODE: disable
      GIN_MODE: debug
      LOG_LEVEL: debug
      PROMETHEUS_ENABLED: "true"
    ports:
      - "8090:8090"
    volumes:
      - ./src:/app/src:ro
      - ./migrations:/app/migrations:ro
    depends_on:
      - postgres-setup
    networks:
      - lab-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8090/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "logging=promtail"
      - "service_name=pim-service"

networks:
  lab-network:
    external: true
