version: '3.8'

services:
  # PostgreSQL for pim service
  postgres:
    image: postgres:15-alpine
    container_name: pim-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pim_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - pim-network

  # pim Service
  pim-service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pim-service
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: pim_db
      DB_SSLMODE: disable
    ports:
      - "8090:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - pim-network

volumes:
  postgres_data:

networks:
  pim-network:
    driver: bridge
